<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Harness: Info bubbles on the popup surface (FMN-169)</title>
<!--
  Synthetic harness for FMN-169 popup-surface info bubbles. Mimics the
  popup's tool tiles and update banner with the exact selectors the
  registry expects, then imports the bubble module (ES module) and
  mounts. No real popup.html dependency - the real popup has many
  import dependencies the test does not need to exercise.

  How to run:
    npx playwright test tests/e2e/fmn-169-info-bubbles.spec.js
-->
<style>
  body { font: 13px -apple-system, BlinkMacSystemFont, sans-serif; padding: 16px; background: #f4f5f7; }
  .update-banner { display: flex; gap: 8px; padding: 10px 14px; background: #dbeafe; border: 1px solid #93c5fd;
                   border-radius: 4px; max-width: 360px; }
  .update-banner-body { word-break: break-word; }
  .tool-card { display: flex; gap: 10px; padding: 10px 16px; background: #fff;
               border: 1px solid #e2e5ea; border-radius: 4px; max-width: 360px;
               margin: 8px 0; cursor: pointer; }
  .tool-card .tool-name { font-size: 12.5px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .tool-desc { font-size: 11.5px; color: #6b7380; margin-top: 2px; }
  .badge.beta { background: #fff4d1; color: #8b6f00; font-size: 9.5px; padding: 1px 6px; border-radius: 100px; }
  .review-section { background: #fff; padding: 8px 12px; border: 1px solid #e2e5ea; max-width: 360px; margin: 8px 0; }
  .review-section h3 { font-size: 13px; margin: 0; }
  .review-section table.review-table { width: 100%; }
</style>
</head>
<body>

<div id="update-banner" class="update-banner">
  <div class="update-banner-body">
    <strong>Update available:</strong>
    v<span id="update-banner-remote">1.7.0</span>.
    You're on v<span id="update-banner-local">1.6.0</span>.
  </div>
</div>

<button class="tool-card" data-tool="bulk-composer">
  <div class="tool-meta">
    <div class="tool-name">
      Bulk Action Composer
      <span class="badge beta">Beta</span>
    </div>
    <div class="tool-desc">…</div>
  </div>
</button>

<div class="review-section">
  <h3 class="fmn-noise-summary">Noise Summary</h3>
  <table class="review-table"><tbody><tr><td>placeholder</td></tr></tbody></table>
</div>

<!--
  Storage stubs. The harness ships with the master flag UNSET (i.e.
  default-on for fresh installs) so the first scenario can assert
  "bubble appears". Tests use window.__harness to mutate state.
-->
<script>
  const storageState = {};
  const storageListeners = [];
  window.chrome = {
    runtime: { lastError: null },
    storage: {
      local: {
        get: (keyOrKeys) => {
          if (typeof keyOrKeys === 'string') {
            return Promise.resolve({ [keyOrKeys]: storageState[keyOrKeys] });
          }
          if (Array.isArray(keyOrKeys)) {
            const out = {};
            for (const k of keyOrKeys) out[k] = storageState[k];
            return Promise.resolve(out);
          }
          return Promise.resolve({ ...storageState });
        },
        set: (obj) => {
          const changes = {};
          for (const [k, v] of Object.entries(obj)) {
            changes[k] = { oldValue: storageState[k], newValue: v };
            storageState[k] = v;
          }
          for (const fn of storageListeners) fn(changes, 'local');
          return Promise.resolve();
        },
      },
      onChanged: {
        addListener: (fn) => storageListeners.push(fn),
      },
    },
  };
  window.__harness = {
    storageState,
    setFlag(value) {
      return chrome.storage.local.set({ 'fm:showInfoBubbles': value });
    },
    seedDismissed(list) {
      return chrome.storage.local.set({ 'fm:dismissedInfoBubbles': list });
    },
    reset() {
      Object.keys(storageState).forEach((k) => delete storageState[k]);
    },
  };
</script>

<script type="module">
  import {
    mountInfoBubbles,
    setInfoBubbleHoverDelay,
    _resetInfoBubbleStateForTests,
  } from '../../extension/src/lib/info-bubble.js';

  // Zero out the hover delay so the spec doesn't burn 500 ms per
  // assertion.
  setInfoBubbleHoverDelay(0);
  window.__resetInfoBubbleStateForTests = _resetInfoBubbleStateForTests;
  window.__mountInfoBubbles = (surface) => mountInfoBubbles(document, { surface });
  window.__setHoverDelay = (ms) => setInfoBubbleHoverDelay(ms);
  document.title = 'info-bubble popup harness ready';
</script>

</body>
</html>
