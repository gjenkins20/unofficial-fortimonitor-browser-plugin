<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Harness: omni-search content-script UI (FMN-152)</title>
<!--
  Synthetic harness for FMN-152: in-page omni-search that replaces
  FortiMonitor's "Search Instances" input. Provides:
    - A mock FortiMonitor top bar with .search-form > input[placeholder="Search Instances"]
      matching the structure observed live.
    - chrome.storage.local with onChanged dispatch.
    - chrome.runtime.sendMessage stub that handles omni-search:warm,
      omni-search:query, and omni-search:refresh against a canned
      servers dataset, so tests can drive the UI without running the
      real SW dispatch.

  Companion spec: tests/e2e/omni-search.spec.js. The spec sets the
  fm:omniSearchEnabled flag via window.__harnessSet to flip the toggle
  on / off as the operator would.
-->
<style>
  body {
    font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 0; padding: 0; background: #f4f5f7; color: #222;
  }
  .topbar {
    display: flex; justify-content: flex-end; align-items: center;
    padding: 10px 16px; background: #fff; border-bottom: 1px solid #e3e6eb;
  }
  .pa-input { font: inherit; padding: 0 8px; }
  .pa-input_phony { display: inline-block; }
  .pa-input_xxs { /* size class noise from FortiMonitor */ }
  .search-form { display: inline-flex; align-items: center; }
  .pa-input_search { height: 32px; width: 181px; border: 1px solid #d6d9dd; border-radius: 4px; }
  .heartbeat { position: fixed; bottom: 8px; left: 8px; background: #d6f5d6; border: 1px solid #67c167;
    border-radius: 4px; padding: 2px 8px; font-variant-numeric: tabular-nums; }
  .heartbeat.frozen { background: #f7c7c7; border-color: #c25c5c; }
</style>
</head>
<body>

<div class="topbar">
  <!-- Matches the live FortiMonitor markup observed during FMN-152 probing. -->
  <span class="pa-input pa-input_phony pa-input_xxs search-form">
    <input data-v-2de63346 name="q" placeholder="Search Instances" class="pa-input pa-input_search" style="height: 32px;">
  </span>
</div>

<div class="heartbeat" id="hb">heartbeat: 0</div>

<script>
  // Heartbeat - frozen counter == augment.js froze the page (FMN-72 guard).
  (function () {
    const el = document.getElementById('hb');
    let n = 0;
    let lastTick = performance.now();
    setInterval(function () {
      n += 1;
      const now = performance.now();
      const gap = now - lastTick;
      lastTick = now;
      el.textContent = 'heartbeat: ' + n + ' (gap ' + Math.round(gap) + 'ms)';
      if (gap > 800) { el.classList.add('frozen'); el.textContent += ' [STARVED]'; }
    }, 100);
  })();

  // Canned dataset the sendMessage stub searches against. Mirrors the
  // shape buildServerEntry returns in production.
  const CANNED_SERVERS = [
    { id: 1, name: 'server', fqdn: 'server.example', additional_fqdns: [], description: '',
      tags: [], attributes: [], device_type: 'server', device_sub_type: '', agent_version: '2025.1.0',
      status: 'active', group_name: 'Production', template_names: [] },
    { id: 2, name: 'SQL_Server_01', fqdn: 'sql01.example', additional_fqdns: ['10.0.0.185'],
      description: '', tags: ['Windows'], attributes: [{ name: 'Operating System', value: 'Windows Server 2019' }],
      device_type: 'server', device_sub_type: '', agent_version: '2025.2.14', status: 'active',
      group_name: 'Production', template_names: [] },
    { id: 3, name: 'redhat_lab_01', fqdn: 'rhel.example', additional_fqdns: ['10.0.0.170'],
      description: '', tags: ['Linux'], attributes: [{ name: 'Operating System', value: 'Red Hat Enterprise Linux' }],
      device_type: 'server', device_sub_type: '', agent_version: '2025.4.5', status: 'active',
      group_name: 'INCOMING SERVERS', template_names: [] },
  ];

  // chrome.* stubs.
  (function () {
    const storeData = {};
    const listeners = new Set();
    const sendMessageCalls = [];
    let warmDelayMs = 50;     // tests can adjust via window.__omniHarness.setWarmDelay()
    let nextWarmShouldFail = false;
    let nextQueryShouldFail = false;

    function clone(v) { return v == null ? v : JSON.parse(JSON.stringify(v)); }

    function lowerSearchableFields(s) {
      const parts = [s.name, s.fqdn, ...(s.additional_fqdns || []), s.description,
        ...(s.tags || []),
        ...(s.attributes || []).flatMap(a => [a.name, a.value]),
        s.device_type, s.device_sub_type, s.agent_version, s.status,
        s.group_name, ...(s.template_names || [])
      ];
      return parts.filter(Boolean).join('\n').toLowerCase();
    }

    function handleQuery(payload) {
      const q = String(payload?.query ?? '').trim().toLowerCase();
      if (!q) return { query: '', total: 0, matches: [] };
      const scored = [];
      for (const s of CANNED_SERVERS) {
        if (!lowerSearchableFields(s).includes(q)) continue;
        const name = s.name.toLowerCase();
        const fqdn = (s.fqdn || '').toLowerCase();
        let score = 0, field = 'other';
        if (name === q) { score = 1000; field = 'name'; }
        else if (fqdn === q) { score = 900; field = 'fqdn'; }
        else if (name.startsWith(q)) { score = 800; field = 'name'; }
        else if (name.includes(q)) { score = 600; field = 'name'; }
        else if ((s.additional_fqdns || []).some(a => String(a).toLowerCase().includes(q))) {
          score = 500; field = 'ip';
        }
        else if (fqdn.includes(q)) { score = 400; field = 'fqdn'; }
        else if ((s.tags || []).some(t => String(t).toLowerCase().includes(q))) { score = 300; field = 'tag'; }
        else if ((s.attributes || []).some(a => String(a.value).toLowerCase().includes(q) || String(a.name).toLowerCase().includes(q))) {
          score = 250; field = 'attribute';
        }
        else if ((s.group_name || '').toLowerCase().includes(q)) { score = 150; field = 'group'; }
        scored.push({ score, field, server: s });
      }
      scored.sort((a, b) => b.score - a.score || a.server.name.localeCompare(b.server.name));
      const max = payload?.max ?? 25;
      return { query: q, total: scored.length, matches: scored.slice(0, max).map(x => ({ ...x.server, matched_field: x.field })) };
    }

    window.chrome = {
      runtime: {
        getURL: function (p) { return p; },
        id: 'harness-extension-id',
        lastError: null,
        sendMessage: function (msg, cb) {
          sendMessageCalls.push({ type: msg?.type, payload: clone(msg?.payload), ts: Date.now() });
          const respond = (result, err) => {
            window.chrome.runtime.lastError = err ? { message: err } : null;
            if (cb) try { cb(err ? { ok: false, error: err } : { ok: true, result }); }
              catch (e) { console.error('cb threw', e); }
            window.chrome.runtime.lastError = null;
          };
          if (msg?.type === 'omni-search:warm') {
            setTimeout(() => {
              if (nextWarmShouldFail) { nextWarmShouldFail = false; respond(null, 'warm-failed'); return; }
              respond({ fetchedAt: Date.now(), serverCount: CANNED_SERVERS.length });
            }, warmDelayMs);
          } else if (msg?.type === 'omni-search:query') {
            if (nextQueryShouldFail) { nextQueryShouldFail = false; setTimeout(() => respond(null, 'query-failed'), 10); return; }
            setTimeout(() => respond(handleQuery(msg.payload)), 10);
          } else if (msg?.type === 'omni-search:refresh') {
            setTimeout(() => respond({ fetchedAt: Date.now(), serverCount: CANNED_SERVERS.length }), 30);
          } else if (msg?.type === 'fm:noop-wake') {
            respond({ ok: true });
          } else {
            respond(null, `Unknown message type: ${msg?.type}`);
          }
        },
      },
      storage: {
        local: {
          get: function (key) {
            return new Promise(function (resolve) {
              if (typeof key === 'string') {
                const out = {};
                if (key in storeData) out[key] = clone(storeData[key]);
                resolve(out);
              } else { resolve(clone(storeData)); }
            });
          },
          set: function (obj) {
            return new Promise(function (resolve) {
              const changes = {};
              for (const k of Object.keys(obj)) {
                changes[k] = { oldValue: clone(storeData[k]), newValue: clone(obj[k]) };
                storeData[k] = clone(obj[k]);
              }
              for (const fn of listeners) {
                try { fn(changes, 'local'); } catch (e) { console.error('listener error', e); }
              }
              resolve();
            });
          },
        },
        onChanged: {
          addListener: function (fn) { listeners.add(fn); },
          removeListener: function (fn) { listeners.delete(fn); },
        },
      },
    };

    // Harness control surface for the Playwright spec.
    window.__omniHarness = {
      sendMessageCalls,
      setWarmDelay: (ms) => { warmDelayMs = ms; },
      failNextWarm: () => { nextWarmShouldFail = true; },
      failNextQuery: () => { nextQueryShouldFail = true; },
      resetCallLog: () => { sendMessageCalls.length = 0; },
      setEnabled: (on) => window.chrome.storage.local.set({ 'fm:omniSearchEnabled': Boolean(on) }),
      getStore: () => clone(storeData),
      // Forcibly remove our container (simulates host Vue re-render).
      simulateHostRerenderWipe: () => {
        const c = document.getElementById('fmn-omni-search-container');
        if (c) c.remove();
        // Also strip the hidden attr to mimic the host re-rendering search-form.
        for (const el of document.querySelectorAll('.search-form[data-fmn-omni-search-hidden]')) {
          el.removeAttribute('data-fmn-omni-search-hidden');
        }
      },
    };
  })();

  try { history.replaceState({}, '', '/report/ListServers'); } catch {}
</script>

<script src="../../extension/src/content/augment.js"></script>

</body>
</html>
