<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Harness: Instances list augmentation (FMN-71/72/73/75/76)</title>
<!--
  Synthetic harness for src/content/augment.js (Instances list slice).

  Why this exists: FMN-72 previously shipped a MutationObserver feedback loop
  that froze the page. Per the project's Verification Discipline, post-breakage
  fixes need at minimum a synthetic harness verification before being marked
  done. This file is that harness.

  How to run:
    1. From repo root: python3 -m http.server 8765
    2. Open http://localhost:8765/docs/harnesses/instances-list.html
    3. Watch the heartbeat counter (top right) - if it stops, the page froze.

  What's stubbed:
    - chrome.storage.local (in-memory map, fires onChanged listeners)
    - chrome.storage.onChanged (real EventTarget-style addListener)
    - chrome.runtime.getURL  (just returns the input)
    - location.pathname is set to /report/ListServers via history.replaceState
      (works on http://localhost; would not work on file://).

  What's NOT stubbed:
    - The /report/get_idp_data fetch is intercepted to return canned IP/DNS
      and Model/Model #/OS data so cells render content instead of "not
      captured" / "n/a" forever. The mock includes the placeholder
      pageData.instance.deviceModel and operatingSystem fields known to be
      traps on the real endpoint (FMN-76 finding) so a regression that reads
      them would surface as wrong column values.

  Expected render with all four FMN-76 columns visible (after augment.js
  normalizes the persisted order against the registry):
    - s-101 / edge-fw-01 (Fortinet)     -> Model: FortiGate    Model #: VM64-AWS  OS: v7.6.3 build3510
    - s-102 / edge-fw-02 (Fortinet)     -> Model: FortiGate    Model #: 60F       OS: v7.4.5 build2741
    - s-103 / core-sw-01 (non-Fortinet) -> Model: n/a (italic) Model #: n/a       OS: n/a
    - s-104 / core-sw-02 (non-Fortinet) -> Model: n/a (italic) Model #: n/a       OS: n/a

  Controls below the table let you exercise the storage-driven reorder/hide
  paths without needing the popup, and inject new rows to confirm the
  MutationObserver feedback path is well-behaved.
-->
<style>
  body {
    font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 0; padding: 16px; background: #f4f5f7; color: #222;
  }
  h1 { font-size: 16px; margin: 0 0 12px; }
  .top {
    display: flex; gap: 16px; align-items: flex-start;
    justify-content: space-between; margin-bottom: 12px;
  }
  .panel {
    background: #fff; border: 1px solid #d4d7dc; border-radius: 6px;
    padding: 12px;
  }
  .panel + .panel { margin-top: 10px; }
  .panel h2 { font-size: 12px; margin: 0 0 8px; color: #555; text-transform: uppercase; letter-spacing: 0.04em; }
  button { font: inherit; padding: 4px 10px; margin: 0 4px 4px 0; cursor: pointer;
    background: #fff; border: 1px solid #c4c8cf; border-radius: 4px; }
  button:hover { background: #f0f2f5; }
  pre { font: 11.5px ui-monospace, Menlo, monospace; background: #f7f8fa;
    border: 1px solid #e3e6eb; padding: 6px 8px; border-radius: 4px; margin: 4px 0;
    white-space: pre-wrap; word-break: break-all; }
  .heartbeat {
    background: #d6f5d6; border: 1px solid #67c167; border-radius: 4px;
    padding: 4px 10px; font-variant-numeric: tabular-nums; font-weight: 600;
  }
  .heartbeat.frozen { background: #f7c7c7; border-color: #c25c5c; }
  /* Replicate the parts of FortiMonitor's Instances list that augment.js gates on. */
  table.pa-table_outage {
    width: 100%; background: #fff; border-collapse: collapse;
    border: 1px solid #d4d7dc; border-radius: 6px; overflow: hidden;
  }
  table.pa-table_outage th, table.pa-table_outage td {
    border-bottom: 1px solid #e3e6eb; padding: 8px 10px; text-align: left;
    vertical-align: middle;
  }
  table.pa-table_outage thead th {
    background: #fafbfc; font-weight: 600; font-size: 12px;
  }
  table.pa-table_outage td.instance-column {
    min-width: 320px;
  }
  .row-actions { margin-top: 8px; }
  .small { color: #666; font-size: 11.5px; }
</style>
</head>
<body>

<div class="top">
  <h1>Instances list augmentation harness <span class="small">(FMN-71/72/73)</span></h1>
  <div class="heartbeat" id="hb">heartbeat: 0</div>
</div>

<!--
  Markup mirrors what augment.js looks for: a table.pa-table_outage with a
  thead row containing an "Instance" TH (we add some sibling THs so the index
  isn't 0, like the real page), and tbody rows that each contain an
  input.pa-table-row-checkbox (with value of form "s-{id}") plus a
  td.instance-column.
-->
<div class="panel">
  <h2>Simulated FortiMonitor Instances table</h2>
  <table class="pa-table_outage">
    <thead>
      <tr>
        <th><input type="checkbox" /></th>
        <th>Status</th>
        <th>Instance</th>
        <th>Group</th>
        <th>Tags</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <!-- rows injected from script -->
    </tbody>
  </table>
  <div class="row-actions">
    <button id="add-row">Add row (simulate paginate / SPA refresh)</button>
    <span class="small">Triggers the MutationObserver path. Heartbeat must keep ticking.</span>
  </div>
</div>

<div class="panel">
  <h2>Storage-driven controls (simulate popup writes)</h2>
  <button data-order='[{"id":"instance"},{"id":"ip"},{"id":"dns"}]'>Default order: Instance · IP · DNS</button>
  <button data-order='[{"id":"dns"},{"id":"instance"},{"id":"ip"}]'>Reorder: DNS · Instance · IP</button>
  <button data-order='[{"id":"ip"},{"id":"dns"},{"id":"instance"}]'>Reorder: IP · DNS · Instance</button>
  <br/>
  <button data-order='[{"id":"instance"},{"id":"ip","hidden":true},{"id":"dns"}]'>Hide IP only</button>
  <button data-order='[{"id":"instance"},{"id":"ip"},{"id":"dns","hidden":true}]'>Hide DNS only</button>
  <button data-order='[{"id":"instance"},{"id":"ip","hidden":true},{"id":"dns","hidden":true}]'>Hide IP + DNS</button>
  <br/>
  <button id="dump-state">Dump current state to console</button>
  <button id="dump-storage">Dump storage to console</button>
</div>

<div class="panel">
  <h2>Console echo (last 30 lines)</h2>
  <pre id="console-echo"></pre>
</div>

<script>
  // ------ Heartbeat: a setInterval-driven counter. The augmentation runs on
  //        the same event loop as this timer, so a synchronous infinite loop
  //        in augment.js (the FMN-72 freeze pattern) will starve it.
  (function () {
    const el = document.getElementById('hb');
    let n = 0;
    let lastTick = performance.now();
    setInterval(function () {
      n += 1;
      const now = performance.now();
      const gap = now - lastTick;
      lastTick = now;
      el.textContent = 'heartbeat: ' + n + ' (last gap ' + Math.round(gap) + 'ms)';
      if (gap > 800) {
        el.classList.add('frozen');
        el.textContent += ' [STARVED]';
      }
    }, 100);
  })();

  // ------ Tee console output into the on-page echo so it survives across
  //        page navigations and is easy to read alongside the DOM.
  (function () {
    const echo = document.getElementById('console-echo');
    const lines = [];
    const orig = { log: console.log, warn: console.warn, error: console.error };
    function append(level, args) {
      const text = '[' + level + '] ' + args.map(function (a) {
        if (typeof a === 'string') return a;
        try { return JSON.stringify(a); } catch (e) { return String(a); }
      }).join(' ');
      lines.push(text);
      while (lines.length > 30) lines.shift();
      echo.textContent = lines.join('\n');
    }
    console.log = function () { orig.log.apply(console, arguments); append('log', Array.from(arguments)); };
    console.warn = function () { orig.warn.apply(console, arguments); append('warn', Array.from(arguments)); };
    console.error = function () { orig.error.apply(console, arguments); append('error', Array.from(arguments)); };
  })();

  // ------ chrome.* stubs. Must exist before augment.js loads (its IIFE runs
  //        at script-tag eval time and reads chrome.runtime + chrome.storage).
  (function () {
    const storeData = {};
    const listeners = new Set();
    function clone(v) { return v == null ? v : JSON.parse(JSON.stringify(v)); }

    window.chrome = {
      runtime: {
        getURL: function (p) { return p; },
        id: 'harness-extension-id',
      },
      storage: {
        local: {
          get: function (key) {
            return new Promise(function (resolve) {
              if (typeof key === 'string') {
                const out = {};
                if (key in storeData) out[key] = clone(storeData[key]);
                resolve(out);
              } else {
                resolve(clone(storeData));
              }
            });
          },
          set: function (obj) {
            return new Promise(function (resolve) {
              const changes = {};
              for (const k of Object.keys(obj)) {
                changes[k] = { oldValue: clone(storeData[k]), newValue: clone(obj[k]) };
                storeData[k] = clone(obj[k]);
              }
              for (const fn of listeners) {
                try { fn(changes, 'local'); } catch (e) { console.error('listener error', e); }
              }
              resolve();
            });
          },
        },
        onChanged: {
          addListener: function (fn) { listeners.add(fn); },
          removeListener: function (fn) { listeners.delete(fn); },
        },
      },
    };
    window.__harnessStore = storeData;
  })();

  // ------ /report/get_idp_data interceptor. The real augment.js fetches one
  //        of these per row to get IP/DNS. Returning canned data lets us see
  //        the cells populate; fingerprints differ per server id.
  (function () {
    const origFetch = window.fetch;
    window.fetch = function (input, init) {
      const url = typeof input === 'string' ? input : (input && input.url) || '';
      const m = url.match(/\/report\/get_idp_data\?server_id=(\d+)/);
      if (m) {
        const id = m[1];
        // Alternate IP and DNS so the regex classification covers both paths.
        const useIp = (Number(id) % 2) === 0;
        const fqdn = useIp ? ('10.0.0.' + (Number(id) % 200)) : ('host-' + id + '.example.com');
        // FMN-76: only Fortinet/fabric rows populate fabricSystemData on the
        // real endpoint. Mock IDs 101 and 102 as Fortinet; 103+ as non-Fortinet
        // (no fabricSystemData) so the n/a empty-state path is exercised.
        const fortinetIds = new Set(['101', '102']);
        const isFortinet = fortinetIds.has(id);
        const fabricSystemData = isFortinet ? {
          model_name: 'FortiGate',
          model_number: id === '101' ? 'VM64-AWS' : '60F',
          os_version: id === '101' ? 'v7.6.3 build3510' : 'v7.4.5 build2741',
        } : null;
        const body = JSON.stringify({
          pageData: {
            instance: {
              name: 'instance-' + id,
              fqdn: fqdn,
              // FMN-76: deviceModel and operatingSystem are placeholder/stale
              // on the real endpoint. Included here so a regression that reads
              // them instead of fabricSystemData would surface visibly as
              // every Model column showing "server_id" and every OS showing
              // "linux".
              deviceModel: 'server_id',
              operatingSystem: 'linux',
              fabricSystemData: fabricSystemData,
            },
          },
        });
        return Promise.resolve(new Response(body, {
          status: 200, headers: { 'Content-Type': 'application/json' },
        }));
      }
      return origFetch.apply(this, arguments);
    };
  })();

  // ------ Set the URL pathname so augment.js's path gate passes. This
  //        only works on http(s):// origins; serve via python -m http.server.
  history.replaceState({}, '', '/report/ListServers');

  // ------ Seed the table with a few rows. Use the same DOM shape augment.js
  //        looks for: input.pa-table-row-checkbox + td.instance-column.
  function makeRow(serverId, name) {
    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td><input type="checkbox" class="pa-table-row-checkbox" value="s-' + serverId + '" /></td>' +
      '<td><span class="status-dot status-up"></span></td>' +
      '<td class="instance-column">' + name + '</td>' +
      '<td>Production</td>' +
      '<td>tag-1, tag-2</td>';
    return tr;
  }
  (function seed() {
    const tbody = document.getElementById('tbody');
    tbody.appendChild(makeRow(101, 'edge-fw-01'));
    tbody.appendChild(makeRow(102, 'edge-fw-02'));
    tbody.appendChild(makeRow(103, 'core-sw-01'));
    tbody.appendChild(makeRow(104, 'core-sw-02'));
  })();

  // ------ Storage-control button bindings.
  document.querySelectorAll('button[data-order]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      const order = JSON.parse(btn.getAttribute('data-order'));
      const cur = window.__harnessStore['fm:webguiColumns'] || {};
      const next = Object.assign({}, cur, { 'instances-ip-dns-columns': order });
      chrome.storage.local.set({ 'fm:webguiColumns': next });
      console.log('storage write:', JSON.stringify(order));
    });
  });
  document.getElementById('dump-state').addEventListener('click', function () {
    const headers = Array.from(document.querySelectorAll('.fmn-hdr-grid > [data-fmn-col]'))
      .map(function (e) {
        const id = e.getAttribute('data-fmn-col');
        const hidden = e.hasAttribute('hidden');
        return id + (hidden ? '(hidden)' : '');
      });
    console.log('header order:', headers.join(' | '));
    const firstRow = document.querySelector('.fmn-cell-grid');
    if (firstRow) {
      const cells = Array.from(firstRow.querySelectorAll('[data-fmn-col]'))
        .map(function (e) {
          const id = e.getAttribute('data-fmn-col');
          const hidden = e.hasAttribute('hidden');
          return id + ':' + (e.textContent || '').trim().slice(0, 30) + (hidden ? '(hidden)' : '');
        });
      console.log('first row cells:', cells.join(' | '));
    }
  });
  document.getElementById('dump-storage').addEventListener('click', function () {
    console.log('storage:', JSON.stringify(window.__harnessStore));
  });
  document.getElementById('add-row').addEventListener('click', function () {
    const tbody = document.getElementById('tbody');
    const id = 200 + tbody.children.length;
    tbody.appendChild(makeRow(id, 'late-arrival-' + id));
    console.log('row injected: s-' + id);
  });
</script>

<!--
  Load the real content script. This is the script that ships in the
  extension; nothing in it is mocked here. The IIFE registers its
  augmentations and starts the MutationObserver immediately on eval, so
  the table seeded above will get augmented within one observer tick.
-->
<script src="../../extension/src/content/augment.js"></script>

</body>
</html>
