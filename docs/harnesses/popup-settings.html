<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Harness: popup Settings panel (FMN-72/73)</title>
<!--
  Synthetic harness for src/popup/popup.html (Settings → WebGUI columns slice).

  How it works: we fetch popup.html from disk, inject (a) a <base> tag so the
  relative <link>/<script> URLs in popup.html resolve to /extension/src/popup/,
  and (b) a chrome.* stub script before popup.js's module tag. The patched
  popup.html is loaded into an iframe via srcdoc so it runs in its own window
  with our stubs already in place.

  The iframe's window.__harnessStore exposes the in-memory storage so the
  parent harness can probe state. The right-side panel below mirrors storage
  state and provides quick checks for the WebGUI-columns Settings section.

  Run:
    1. From repo root: python3 -m http.server 8765
    2. Open http://localhost:8765/docs/harnesses/popup-settings.html
    3. Click ⚙ in the iframe → scroll to "WebGUI columns" section.
-->
<style>
  body { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 0; padding: 16px; background: #f4f5f7; color: #222; }
  h1 { font-size: 16px; margin: 0 0 12px; }
  .grid { display: grid; grid-template-columns: 380px 1fr; gap: 16px; align-items: flex-start; }
  iframe { width: 380px; height: 720px; border: 1px solid #c4c8cf; border-radius: 6px;
    background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .panel { background: #fff; border: 1px solid #d4d7dc; border-radius: 6px; padding: 12px; }
  .panel h2 { font-size: 12px; margin: 0 0 8px; color: #555; text-transform: uppercase; letter-spacing: 0.04em; }
  pre { font: 11.5px ui-monospace, Menlo, monospace; background: #f7f8fa;
    border: 1px solid #e3e6eb; padding: 6px 8px; border-radius: 4px; white-space: pre-wrap;
    word-break: break-all; max-height: 320px; overflow: auto; }
  button { font: inherit; padding: 4px 10px; margin: 0 4px 4px 0; cursor: pointer;
    background: #fff; border: 1px solid #c4c8cf; border-radius: 4px; }
  button:hover { background: #f0f2f5; }
  .small { color: #666; font-size: 11.5px; }
</style>
</head>
<body>

<h1>Popup Settings → WebGUI columns harness <span class="small">(FMN-72/73)</span></h1>

<div class="grid">
  <iframe id="frame"></iframe>
  <div>
    <div class="panel">
      <h2>Probe popup state</h2>
      <button id="open-settings">Click ⚙ in popup</button>
      <button id="dump-cards">Dump rendered column cards</button>
      <button id="dump-storage">Dump iframe storage</button>
      <button id="seed-reorder">Seed storage: DNS · Instance · IP</button>
      <button id="seed-hide">Seed storage: hide IP</button>
      <button id="reload-frame">Reload popup</button>
      <pre id="probe-output">(probe results land here)</pre>
    </div>
  </div>
</div>

<script>
  const STORE_KEY = 'fm:webguiColumns';

  // chrome.* stubs that get injected into the iframe document. Identical
  // shape to the augment.js harness: an in-memory store that fires the
  // onChanged listener queue, plus a no-op chrome.tabs/runtime.
  const STUBS = `
    <script>
      (function () {
        const storeData = {};
        const listeners = new Set();
        function clone(v) { return v == null ? v : JSON.parse(JSON.stringify(v)); }
        window.__harnessStore = storeData;
        window.chrome = {
          runtime: {
            id: 'harness-extension-id',
            getURL: function (p) { return p; },
          },
          tabs: { create: function () {} },
          storage: {
            local: {
              get: function (key) {
                return new Promise(function (resolve) {
                  if (typeof key === 'string') {
                    const out = {};
                    if (key in storeData) out[key] = clone(storeData[key]);
                    resolve(out);
                  } else { resolve(clone(storeData)); }
                });
              },
              set: function (obj) {
                return new Promise(function (resolve) {
                  const changes = {};
                  for (const k of Object.keys(obj)) {
                    changes[k] = { oldValue: clone(storeData[k]), newValue: clone(obj[k]) };
                    storeData[k] = clone(obj[k]);
                  }
                  for (const fn of listeners) { try { fn(changes, 'local'); } catch (e) {} }
                  resolve();
                });
              },
              remove: function (key) {
                return new Promise(function (resolve) {
                  const keys = Array.isArray(key) ? key : [key];
                  const changes = {};
                  for (const k of keys) {
                    if (k in storeData) {
                      changes[k] = { oldValue: clone(storeData[k]), newValue: undefined };
                      delete storeData[k];
                    }
                  }
                  for (const fn of listeners) { try { fn(changes, 'local'); } catch (e) {} }
                  resolve();
                });
              },
            },
            onChanged: {
              addListener: function (fn) { listeners.add(fn); },
              removeListener: function (fn) { listeners.delete(fn); },
            },
          },
        };
      })();
    <\/script>
  `;

  async function loadPopup() {
    const html = await fetch('/extension/src/popup/popup.html').then(function (r) { return r.text(); });
    // Inject <base> so the relative popup.css / popup.js paths in popup.html
    // resolve to the popup directory, and inject stubs before popup.js loads.
    const patched = html.replace(
      /<head>/i,
      '<head><base href="/extension/src/popup/">' + STUBS
    );
    document.getElementById('frame').srcdoc = patched;
  }

  function frameWin() {
    const f = document.getElementById('frame');
    return f && f.contentWindow;
  }

  function setOutput(label, val) {
    const out = document.getElementById('probe-output');
    const text = typeof val === 'string' ? val : JSON.stringify(val, null, 2);
    out.textContent = '[' + label + ']\n' + text;
  }

  document.getElementById('reload-frame').addEventListener('click', loadPopup);

  document.getElementById('open-settings').addEventListener('click', function () {
    const win = frameWin();
    if (!win) { setOutput('open-settings', 'iframe not ready'); return; }
    const btn = win.document.getElementById('settings-toggle');
    if (!btn) { setOutput('open-settings', 'settings-toggle not found'); return; }
    btn.click();
    setOutput('open-settings', 'clicked. Wait ~200ms then dump cards.');
  });

  document.getElementById('dump-cards').addEventListener('click', function () {
    const win = frameWin();
    if (!win) { setOutput('dump-cards', 'iframe not ready'); return; }
    const list = win.document.getElementById('webgui-columns-list');
    if (!list) { setOutput('dump-cards', 'webgui-columns-list not in DOM (settings panel may not have been opened)'); return; }
    const cards = Array.from(list.querySelectorAll('.aug-card')).map(function (card) {
      const header = card.querySelector('.aug-card-header');
      const rows = Array.from(card.querySelectorAll('.col-row')).map(function (r) {
        const name = (r.querySelector('.col-name') || {}).textContent || '';
        const hidden = r.classList.contains('is-hidden');
        const locked = r.classList.contains('is-locked');
        const upDisabled = !!r.querySelectorAll('.icon-btn')[0]?.disabled;
        const downDisabled = !!r.querySelectorAll('.icon-btn')[1]?.disabled;
        const eyeDisabled = !!r.querySelector('.icon-btn.eye')?.disabled;
        return { name: name, hidden: hidden, locked: locked, upDisabled: upDisabled, downDisabled: downDisabled, eyeDisabled: eyeDisabled };
      });
      return { header: header ? header.textContent.trim() : '', rows: rows };
    });
    setOutput('dump-cards', cards);
  });

  document.getElementById('dump-storage').addEventListener('click', function () {
    const win = frameWin();
    if (!win) { setOutput('dump-storage', 'iframe not ready'); return; }
    setOutput('dump-storage', win.__harnessStore || {});
  });

  document.getElementById('seed-reorder').addEventListener('click', async function () {
    const win = frameWin();
    if (!win) { setOutput('seed-reorder', 'iframe not ready'); return; }
    await win.chrome.storage.local.set({
      [STORE_KEY]: { 'instances-ip-dns-columns': [
        { id: 'dns' }, { id: 'instance' }, { id: 'ip' }
      ]}
    });
    setOutput('seed-reorder', 'wrote DNS · Instance · IP. Click "Click ⚙ in popup" then "Dump rendered column cards" to verify.');
  });

  document.getElementById('seed-hide').addEventListener('click', async function () {
    const win = frameWin();
    if (!win) { setOutput('seed-hide', 'iframe not ready'); return; }
    await win.chrome.storage.local.set({
      [STORE_KEY]: { 'instances-ip-dns-columns': [
        { id: 'instance' }, { id: 'ip', hidden: true }, { id: 'dns' }
      ]}
    });
    setOutput('seed-hide', 'wrote hide-IP. Open settings, dump cards.');
  });

  loadPopup();
</script>
</body>
</html>
