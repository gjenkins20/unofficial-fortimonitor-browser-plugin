<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Harness: in-page Columns menu on /report/ListServers (FMN-150)</title>
<!--
  Synthetic harness for FMN-150: in-page "Columns" button + popover on
  /report/ListServers. Reproduces FortiMonitor's bulk-action row
  (Add / Move / Delete / Tag / Download) so augment.js can locate it
  by text-match heuristic and inject the toolkit button.

  Companion Playwright spec: tests/e2e/columns-menu.spec.js.
-->
<style>
  body {
    font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 0; padding: 16px; background: #f4f5f7; color: #222;
  }
  h1 { font-size: 16px; margin: 0 0 12px; }
  .panel { background: #fff; border: 1px solid #d4d7dc; border-radius: 6px;
    padding: 12px; margin-bottom: 12px; }
  .panel h2 { font-size: 12px; margin: 0 0 8px; color: #555;
    text-transform: uppercase; letter-spacing: 0.04em; }
  .heartbeat { background: #d6f5d6; border: 1px solid #67c167; border-radius: 4px;
    padding: 4px 10px; font-variant-numeric: tabular-nums; font-weight: 600;
    display: inline-block; margin-bottom: 12px; }
  .heartbeat.frozen { background: #f7c7c7; border-color: #c25c5c; }

  /* FortiMonitor-ish action bar reproduction */
  .action-bar {
    display: flex; gap: 4px; padding: 12px 16px;
    border-bottom: 1px solid #e3e6eb; background: #fff;
    align-items: center;
  }
  .action-bar button {
    background: transparent; border: none; color: #5F6B7A;
    padding: 7px 12px; font-size: 12px; cursor: pointer; font-family: inherit;
  }
  .action-bar button.add {
    background: #D9534F; color: #fff; border-radius: 4px;
    padding: 7px 14px; font-weight: 500;
  }
  .action-bar button.dl { color: #D9534F; }

  /* Minimal table so the FMN-123 augmentation isn't starved on no-data-rows.
     FMN-150's mount does NOT depend on the table, but we keep it so loading
     augment.js doesn't error. */
  table.pa-table_outage { width: 100%; background: #fff; border-collapse: collapse; }
  table.pa-table_outage th, table.pa-table_outage td {
    border-bottom: 1px solid #e3e6eb; padding: 8px 10px; text-align: left;
    font-size: 12px;
  }
  table.pa-table_outage thead th { background: #fafbfc; font-weight: 600; }

  pre { font: 11.5px ui-monospace, Menlo, monospace; background: #f7f8fa;
    border: 1px solid #e3e6eb; padding: 6px 8px; border-radius: 4px;
    margin: 4px 0; white-space: pre-wrap; word-break: break-all; }
</style>
</head>
<body>

<div class="heartbeat" id="hb">heartbeat: 0</div>

<div class="panel">
  <h2>Simulated FortiMonitor bulk-action row</h2>
  <div class="action-bar" id="action-bar">
    <button class="add" type="button">+ Add &#9662;</button>
    <button type="button">Move</button>
    <button type="button">Delete</button>
    <button type="button">Tag</button>
    <button class="dl" type="button">Download</button>
  </div>

  <table class="pa-table_outage" id="instances-table">
    <thead>
      <tr>
        <th><input type="checkbox" /></th>
        <th>Status</th>
        <th>Instance</th>
        <th>Parent Group</th>
        <th>Alert Timeline</th>
        <th>Tags</th>
        <th>Agent Version</th>
        <th>Device Heartbeat</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <!-- rows injected by seed() -->
    </tbody>
  </table>
</div>

<div class="panel">
  <h2>Storage state</h2>
  <pre id="storage-dump">(empty)</pre>
</div>

<div class="panel">
  <h2>Console echo (last 30 lines)</h2>
  <pre id="console-echo"></pre>
</div>

<script>
  // Heartbeat - frozen counter == content script froze the page.
  (function () {
    const el = document.getElementById('hb');
    let n = 0;
    let lastTick = performance.now();
    setInterval(function () {
      n += 1;
      const now = performance.now();
      const gap = now - lastTick;
      lastTick = now;
      el.textContent = 'heartbeat: ' + n + ' (last gap ' + Math.round(gap) + 'ms)';
      if (gap > 800) { el.classList.add('frozen'); el.textContent += ' [STARVED]'; }
    }, 100);
  })();

  // Console echo.
  (function () {
    const echo = document.getElementById('console-echo');
    const lines = [];
    const orig = { log: console.log, warn: console.warn, error: console.error };
    function append(level, args) {
      const text = '[' + level + '] ' + args.map(function (a) {
        if (typeof a === 'string') return a;
        try { return JSON.stringify(a); } catch (e) { return String(a); }
      }).join(' ');
      lines.push(text);
      while (lines.length > 30) lines.shift();
      echo.textContent = lines.join('\n');
    }
    console.log = function () { orig.log.apply(console, arguments); append('log', Array.from(arguments)); };
    console.warn = function () { orig.warn.apply(console, arguments); append('warn', Array.from(arguments)); };
    console.error = function () { orig.error.apply(console, arguments); append('error', Array.from(arguments)); };
  })();

  // chrome.* stubs (same shape as instances-list-native-hide harness).
  (function () {
    const storeData = {};
    const listeners = new Set();
    function clone(v) { return v == null ? v : JSON.parse(JSON.stringify(v)); }
    function dump() {
      const el = document.getElementById('storage-dump');
      el.textContent = Object.keys(storeData).length === 0
        ? '(empty)'
        : JSON.stringify(storeData, null, 2);
    }
    window.chrome = {
      runtime: { getURL: function (p) { return p; }, id: 'harness-extension-id' },
      storage: {
        local: {
          get: function (key) {
            return new Promise(function (resolve) {
              if (typeof key === 'string') {
                const out = {};
                if (key in storeData) out[key] = clone(storeData[key]);
                resolve(out);
              } else { resolve(clone(storeData)); }
            });
          },
          set: function (obj) {
            return new Promise(function (resolve) {
              const changes = {};
              for (const k of Object.keys(obj)) {
                changes[k] = { oldValue: clone(storeData[k]), newValue: clone(obj[k]) };
                storeData[k] = clone(obj[k]);
              }
              dump();
              for (const fn of listeners) {
                try { fn(changes, 'local'); } catch (e) { console.error('listener error', e); }
              }
              resolve();
            });
          },
        },
        onChanged: {
          addListener: function (fn) { listeners.add(fn); },
          removeListener: function (fn) { listeners.delete(fn); },
        },
      },
    };
    window.__harnessStore = storeData;
    window.__harnessDump = dump;
  })();

  // get_idp_data interceptor (FMN-71's IP/DNS augmentation will fetch
  // these on row mount; harness stubs them to keep the network quiet).
  (function () {
    const origFetch = window.fetch;
    window.fetch = function (input) {
      const url = typeof input === 'string' ? input : (input && input.url) || '';
      const m = url.match(/\/report\/get_idp_data\?server_id=(\d+)/);
      if (m) {
        const id = m[1];
        return Promise.resolve(new Response(
          JSON.stringify({ pageData: { instance: { name: 'instance-' + id, fqdn: '10.0.0.1' } } }),
          { status: 200, headers: { 'Content-Type': 'application/json' } }
        ));
      }
      return origFetch.apply(this, arguments);
    };
  })();

  try { history.replaceState({}, '', '/report/ListServers'); } catch {}

  function makeRow(serverId, name) {
    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td><input type="checkbox" class="pa-table-row-checkbox" value="s-' + serverId + '" /></td>' +
      '<td><span class="status-dot status-up"></span></td>' +
      '<td class="instance-column">' + name + '</td>' +
      '<td>Production</td>' +
      '<td>-</td>' +
      '<td>tag-a</td>' +
      '<td>2025.4.01</td>' +
      '<td>just now</td>';
    return tr;
  }
  (function seed() {
    const tbody = document.getElementById('tbody');
    tbody.appendChild(makeRow(901, 'instance-901'));
    tbody.appendChild(makeRow(902, 'instance-902'));
  })();
</script>

<script src="../../extension/src/content/augment.js"></script>

</body>
</html>
