<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Harness: Server Lookup mixed input (FMN-113)</title>
<!--
  Synthetic harness for src/ui/server-lookup/app.html (Server Lookup tool).

  Stubs chrome.runtime.sendMessage so:
    - lookup:server-ids accepts {entries:[...], confirm:bool}
      - name entries: looked up against a canned name->id table
      - url/id entries: pass through with status='resolved'; with confirm=true,
        404s are simulated for unknown ids (only ids in CANNED_SERVERS resolve)
    - lookup:abort: no-op {aborted:false}

  Run:
    1. From repo root: python3 -m http.server 8766 --bind 127.0.0.1
    2. Open http://127.0.0.1:8766/docs/harnesses/server-lookup-mixed.html
-->
<style>
  body { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 0; padding: 16px; background: #f4f5f7; color: #222; }
  h1 { font-size: 16px; margin: 0 0 12px; }
  .grid { display: grid; grid-template-columns: 480px 1fr; gap: 16px; align-items: flex-start; }
  iframe { width: 480px; height: 760px; border: 1px solid #c4c8cf; border-radius: 6px;
    background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .panel { background: #fff; border: 1px solid #d4d7dc; border-radius: 6px; padding: 12px; }
  .panel h2 { font-size: 12px; margin: 0 0 8px; color: #555; text-transform: uppercase; letter-spacing: 0.04em; }
  pre { font: 11.5px ui-monospace, Menlo, monospace; background: #f7f8fa;
    border: 1px solid #e3e6eb; padding: 6px 8px; border-radius: 4px; white-space: pre-wrap;
    word-break: break-all; max-height: 400px; overflow: auto; }
  button { font: inherit; padding: 4px 10px; margin: 0 4px 4px 0; cursor: pointer;
    background: #fff; border: 1px solid #c4c8cf; border-radius: 4px; }
  button:hover { background: #f0f2f5; }
  .small { color: #666; font-size: 11.5px; }
  .heartbeat { display: inline-block; padding: 2px 6px; background: #e8f4ff; color: #134e89; border-radius: 3px; }
</style>
</head>
<body>

<h1>Server Lookup mixed-input harness <span class="small">(FMN-113)</span> · heartbeat <span id="heartbeat" class="heartbeat">0</span></h1>

<div class="grid">
  <iframe id="frame"></iframe>
  <div>
    <div class="panel">
      <h2>Drive the iframe</h2>
      <button id="seed-mixed">Seed: name + URL + raw ID</button>
      <button id="seed-dup">Seed: URL + same raw ID (dedup test)</button>
      <button id="seed-unknown-confirm">Seed: unknown ID + confirm=on</button>
      <button id="dump-parse">Dump parsed entries</button>
      <button id="run-lookup">Click Run lookup</button>
      <button id="dump-results">Dump results table</button>
      <button id="reload-frame">Reload iframe</button>
      <pre id="probe-output">(probe output)</pre>
    </div>
  </div>
</div>

<script>
  let hb = 0;
  setInterval(function () {
    hb++;
    document.getElementById('heartbeat').textContent = String(hb);
  }, 500);

  const STUBS = `
    <script>
      (function () {
        // Canned name -> server matches.
        const NAME_INDEX = {
          'FGVM01TM24006844': [{ id: 42024060, name: 'FGVM01TM24006844', resourceUrl: '/server/42024060' }],
          'AmbiguousName': [
            { id: 100, name: 'AmbiguousName', resourceUrl: '/server/100' },
            { id: 200, name: 'AmbiguousName', resourceUrl: '/server/200' }
          ]
        };
        // ids that exist in the canned tenant (used by confirm=true)
        const CANNED_SERVERS = new Set([42024060, 42024061]);

        const messageListeners = new Set();
        function emit(event, payload) {
          const msg = { type: '__event__', event, payload };
          for (const fn of messageListeners) { try { fn(msg, {}, function(){}); } catch(e){} }
        }

        function nameLookup(name) {
          return NAME_INDEX[name] || [];
        }
        function shapeName(name) {
          const m = nameLookup(name);
          if (m.length === 0) return { name, kind:'name', raw:name, status: 'not_found', matches: [] };
          if (m.length === 1) return { name, kind:'name', raw:name, status: 'found', serverId: m[0].id, matches: m };
          return { name, kind:'name', raw:name, status: 'ambiguous', matches: m };
        }
        function shapeUrlOrId(entry, confirm) {
          if (!confirm) {
            return { kind: entry.kind, raw: entry.raw, status: 'resolved', serverId: entry.serverId, matches: [] };
          }
          if (CANNED_SERVERS.has(entry.serverId)) {
            return { kind: entry.kind, raw: entry.raw, status: 'resolved', serverId: entry.serverId, matches: [{id:entry.serverId}] };
          }
          return { kind: entry.kind, raw: entry.raw, status: 'not_found', serverId: entry.serverId, matches: [] };
        }

        window.chrome = {
          runtime: {
            id: 'harness-extension-id',
            getURL: function (p) { return p; },
            lastError: null,
            sendMessage: function (message, callback) {
              const type = message && message.type;
              const payload = (message && message.payload) || {};
              setTimeout(function () {
                try {
                  if (type === 'lookup:server-ids') {
                    const entries = Array.isArray(payload.entries) ? payload.entries
                      : (Array.isArray(payload.names) ? payload.names.map(function(n){return {kind:'name', raw:n, name:n};}) : []);
                    const confirm = payload.confirm === true;
                    const results = entries.map(function (e, i) {
                      // Fire entry-start / entry-done so the UI exercises the live progress path.
                      emit('lookup:entry-start', { index: i, name: e.kind === 'name' ? e.name : e.raw, kind: e.kind });
                      const r = e.kind === 'name' ? shapeName(e.name) : shapeUrlOrId(e, confirm);
                      emit('lookup:entry-done', {
                        index: i,
                        name: e.kind === 'name' ? e.name : e.raw,
                        kind: e.kind,
                        status: r.status,
                        serverId: r.serverId ?? null,
                        matchCount: r.matches?.length ?? 0,
                        error: null
                      });
                      return r;
                    });
                    callback({ ok: true, result: {
                      results,
                      startedAt: new Date().toISOString(),
                      finishedAt: new Date().toISOString()
                    }});
                  } else if (type === 'lookup:abort') {
                    callback({ ok: true, result: { aborted: false, reason: 'harness' } });
                  } else {
                    callback({ ok: false, error: 'harness: unknown message type ' + type });
                  }
                } catch (err) {
                  callback({ ok: false, error: String(err && err.message || err) });
                }
              }, 0);
            },
            onMessage: {
              addListener: function (fn) { messageListeners.add(fn); },
              removeListener: function (fn) { messageListeners.delete(fn); }
            }
          }
        };
      })();
    <\/script>
  `;

  async function loadFrame() {
    const html = await fetch('/extension/src/ui/server-lookup/app.html').then(function (r) { return r.text(); });
    const patched = html.replace(
      /<head>/i,
      '<head><base href="/extension/src/ui/server-lookup/">' + STUBS
    );
    document.getElementById('frame').srcdoc = patched;
  }

  function frameWin() {
    const f = document.getElementById('frame');
    return f && f.contentWindow;
  }

  function setOutput(label, val) {
    const out = document.getElementById('probe-output');
    const text = typeof val === 'string' ? val : JSON.stringify(val, null, 2);
    out.textContent = '[' + label + ']\n' + text;
  }

  function pause(ms) { return new Promise(function (r) { setTimeout(r, ms); }); }

  function setPaste(text) {
    const win = frameWin(); if (!win) return;
    const ta = win.document.querySelector('textarea.paste-area');
    ta.value = text;
    ta.dispatchEvent(new win.Event('input', { bubbles: true }));
  }
  function setConfirm(checked) {
    const win = frameWin(); if (!win) return;
    const cb = win.document.querySelector('.toggle-row input[type="checkbox"]');
    if (cb && cb.checked !== checked) {
      cb.checked = checked;
      cb.dispatchEvent(new win.Event('change', { bubbles: true }));
    }
  }

  document.getElementById('reload-frame').addEventListener('click', loadFrame);

  document.getElementById('seed-mixed').addEventListener('click', function () {
    setPaste([
      'FGVM01TM24006844',
      'https://fortimonitor.forticloud.com/instance/42024060/details',
      '42024061'
    ].join('\n'));
    setConfirm(false);
    setOutput('seed-mixed', 'Pasted name + URL + raw ID.');
  });

  document.getElementById('seed-dup').addEventListener('click', function () {
    setPaste([
      'https://fortimonitor.forticloud.com/instance/42024060/details',
      '42024060',
      'AmbiguousName'
    ].join('\n'));
    setConfirm(false);
    setOutput('seed-dup', 'Pasted URL + same raw ID + ambiguous name.');
  });

  document.getElementById('seed-unknown-confirm').addEventListener('click', function () {
    setPaste([
      '42024060',
      '99999999'
    ].join('\n'));
    setConfirm(true);
    setOutput('seed-unknown-confirm', 'Pasted known ID + unknown ID with confirm=on.');
  });

  document.getElementById('dump-parse').addEventListener('click', function () {
    const win = frameWin(); if (!win) return;
    const summary = win.document.querySelector('.parse-summary')?.textContent || '(no summary)';
    const warnings = Array.from(win.document.querySelectorAll('.warning-list li')).map(function(li){return li.textContent;});
    setOutput('dump-parse', { summary, warnings });
  });

  document.getElementById('run-lookup').addEventListener('click', async function () {
    const win = frameWin(); if (!win) return;
    const buttons = Array.from(win.document.querySelectorAll('button'));
    const runBtn = buttons.find(function (b) { return b.textContent.trim() === 'Run lookup'; });
    if (!runBtn || runBtn.disabled) { setOutput('run-lookup', 'Run lookup not ready (disabled or not found)'); return; }
    runBtn.click();
    setOutput('run-lookup', 'clicked Run. Wait ~600ms then Dump results.');
  });

  document.getElementById('dump-results').addEventListener('click', function () {
    const win = frameWin(); if (!win) return;
    const tbody = win.document.querySelector('.body-section table tbody');
    if (!tbody) { setOutput('dump-results', 'no results table - is the route at /results?'); return; }
    const ths = Array.from(win.document.querySelectorAll('.body-section table thead th')).map(function (th) { return th.textContent; });
    const rows = Array.from(tbody.querySelectorAll('tr')).map(function (tr) {
      return Array.from(tr.querySelectorAll('td')).map(function (td) { return td.textContent; });
    });
    const headerH2 = win.document.querySelector('.step-header h2')?.textContent;
    const headerP = win.document.querySelector('.step-header p')?.textContent;
    setOutput('dump-results', { hash: win.location.hash, h2: headerH2, summary: headerP, columns: ths, rows: rows });
  });

  loadFrame();
</script>
</body>
</html>
