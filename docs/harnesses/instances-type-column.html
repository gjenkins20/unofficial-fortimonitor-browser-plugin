<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Harness: Type column (FMN-75)</title>
<!--
  Synthetic harness for FMN-75: the Type sub-column on /report/ListServers.

  Specifically verifies: the classifyInstancePrefix mapping fires on all three
  row prefixes (s-, a-, cs-) and populates the Type cell synchronously without
  needing the /report/get_idp_data fetch to resolve.

  Rows seeded cover:
    - s-NNN  → "Server"
    - a-NNN  → "OnSight Appliance"
    - cs-NNN → "Other"
    - bogus- → "unknown" (fmn-unresolved), italic

  Run: python3 -m http.server 8765 from repo root, then open
       http://localhost:8765/docs/harnesses/instances-type-column.html
-->
<style>
  body { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 0; padding: 16px; background: #f4f5f7; color: #222; }
  h1 { font-size: 16px; margin: 0 0 12px; }
  .top { display: flex; gap: 16px; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
  .heartbeat { background: #d6f5d6; border: 1px solid #67c167; border-radius: 4px;
    padding: 4px 10px; font-variant-numeric: tabular-nums; font-weight: 600; }
  .heartbeat.frozen { background: #f7c7c7; border-color: #c25c5c; }
  .panel { background: #fff; border: 1px solid #d4d7dc; border-radius: 6px; padding: 12px; }
  .panel + .panel { margin-top: 10px; }
  .panel h2 { font-size: 12px; margin: 0 0 8px; color: #555; text-transform: uppercase; letter-spacing: 0.04em; }
  button { font: inherit; padding: 4px 10px; margin: 0 4px 4px 0; cursor: pointer;
    background: #fff; border: 1px solid #c4c8cf; border-radius: 4px; }
  button:hover { background: #f0f2f5; }
  pre { font: 11.5px ui-monospace, Menlo, monospace; background: #f7f8fa;
    border: 1px solid #e3e6eb; padding: 6px 8px; border-radius: 4px; white-space: pre-wrap; }
  table.pa-table_outage { width: 100%; background: #fff; border-collapse: collapse;
    border: 1px solid #d4d7dc; border-radius: 6px; overflow: hidden; }
  table.pa-table_outage th, table.pa-table_outage td {
    border-bottom: 1px solid #e3e6eb; padding: 8px 10px; text-align: left; vertical-align: middle; }
  table.pa-table_outage thead th { background: #fafbfc; font-weight: 600; font-size: 12px; }
  table.pa-table_outage td.instance-column { min-width: 320px; }
  .small { color: #666; font-size: 11.5px; }
</style>
</head>
<body>

<div class="top">
  <h1>Type column harness <span class="small">(FMN-75)</span></h1>
  <div class="heartbeat" id="hb">heartbeat: 0</div>
</div>

<div class="panel">
  <h2>Simulated Instances table (all prefix types)</h2>
  <table class="pa-table_outage">
    <thead>
      <tr>
        <th><input type="checkbox" /></th>
        <th>Status</th>
        <th>Instance</th>
        <th>Group</th>
        <th>Tags</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div style="margin-top:8px;">
    <button id="add-server">Add s- row</button>
    <button id="add-appliance">Add a- row</button>
    <button id="add-other">Add cs- row</button>
    <button id="add-bogus">Add bogus row</button>
    <span class="small">All injection paths should populate the Type cell synchronously with no fetch.</span>
  </div>
</div>

<div class="panel">
  <h2>Probe</h2>
  <button id="dump">Dump Type cell values</button>
  <button id="dump-header">Dump header order + labels</button>
  <pre id="probe">(probe output)</pre>
</div>

<script>
  // Heartbeat: same pattern as the instances-list harness. A sync infinite
  // loop in augment.js would starve this timer.
  (function () {
    const el = document.getElementById('hb');
    let n = 0, lastTick = performance.now();
    setInterval(function () {
      n += 1;
      const now = performance.now();
      const gap = now - lastTick; lastTick = now;
      el.textContent = 'heartbeat: ' + n + ' (last gap ' + Math.round(gap) + 'ms)';
      if (gap > 800) { el.classList.add('frozen'); el.textContent += ' [STARVED]'; }
    }, 100);
  })();

  // chrome.* stubs — in-memory storage; same shape as the other harness.
  (function () {
    const storeData = {};
    const listeners = new Set();
    function clone(v) { return v == null ? v : JSON.parse(JSON.stringify(v)); }
    window.__harnessStore = storeData;
    window.chrome = {
      runtime: { getURL: function (p) { return p; }, id: 'harness' },
      storage: {
        local: {
          get: function (key) {
            return new Promise(function (resolve) {
              if (typeof key === 'string') {
                const out = {}; if (key in storeData) out[key] = clone(storeData[key]); resolve(out);
              } else { resolve(clone(storeData)); }
            });
          },
          set: function (obj) {
            return new Promise(function (resolve) {
              const changes = {};
              for (const k of Object.keys(obj)) {
                changes[k] = { oldValue: clone(storeData[k]), newValue: clone(obj[k]) };
                storeData[k] = clone(obj[k]);
              }
              for (const fn of listeners) { try { fn(changes, 'local'); } catch (e) {} }
              resolve();
            });
          },
        },
        onChanged: {
          addListener: function (fn) { listeners.add(fn); },
          removeListener: function (fn) { listeners.delete(fn); },
        },
      },
    };
  })();

  // Intercept get_idp_data so s- rows get IP/DNS; a-/cs- rows fall through
  // to augment.js's existing non-server fallback which renders "not captured".
  (function () {
    const origFetch = window.fetch;
    window.fetch = function (input, init) {
      const url = typeof input === 'string' ? input : (input && input.url) || '';
      const m = url.match(/\/report\/get_idp_data\?server_id=(\d+)/);
      if (m) {
        const body = JSON.stringify({
          pageData: { instance: { name: 'instance-' + m[1], fqdn: 'host-' + m[1] + '.example.com' } },
        });
        return Promise.resolve(new Response(body, { status: 200, headers: { 'Content-Type': 'application/json' } }));
      }
      return origFetch.apply(this, arguments);
    };
  })();

  history.replaceState({}, '', '/report/ListServers');

  function makeRow(value, name) {
    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td><input type="checkbox" class="pa-table-row-checkbox" value="' + value + '" /></td>' +
      '<td><span class="status-dot status-up"></span></td>' +
      '<td class="instance-column">' + name + '</td>' +
      '<td>Production</td>' +
      '<td>tag-1</td>';
    return tr;
  }
  (function seed() {
    const tb = document.getElementById('tbody');
    tb.appendChild(makeRow('s-101', 'edge-fw-01'));
    tb.appendChild(makeRow('s-102', 'core-sw-01'));
    tb.appendChild(makeRow('a-500', 'onsight-appliance-a'));
    tb.appendChild(makeRow('cs-900', 'custom-service-1'));
    tb.appendChild(makeRow('bogus-1', 'unknown-row'));
  })();

  document.getElementById('add-server').addEventListener('click', function () {
    const tb = document.getElementById('tbody');
    tb.appendChild(makeRow('s-' + (200 + tb.children.length), 'late-server-' + tb.children.length));
  });
  document.getElementById('add-appliance').addEventListener('click', function () {
    const tb = document.getElementById('tbody');
    tb.appendChild(makeRow('a-' + (600 + tb.children.length), 'late-appliance-' + tb.children.length));
  });
  document.getElementById('add-other').addEventListener('click', function () {
    const tb = document.getElementById('tbody');
    tb.appendChild(makeRow('cs-' + (1000 + tb.children.length), 'late-other-' + tb.children.length));
  });
  document.getElementById('add-bogus').addEventListener('click', function () {
    const tb = document.getElementById('tbody');
    tb.appendChild(makeRow('xyz-' + tb.children.length, 'late-bogus-' + tb.children.length));
  });

  document.getElementById('dump').addEventListener('click', function () {
    const rows = Array.from(document.querySelectorAll('tbody tr[data-fmn-ip-row-augmented]'));
    const out = rows.map(function (r) {
      const cb = r.querySelector('input.pa-table-row-checkbox');
      const typeCell = r.querySelector('.fmn-cell-type');
      return (cb ? cb.value : '?') + ' → ' + (typeCell ? (typeCell.textContent || '').trim() : '(no type cell)')
        + (typeCell && typeCell.classList.contains('fmn-unresolved') ? ' [unresolved]' : '');
    });
    document.getElementById('probe').textContent = out.join('\n');
  });
  document.getElementById('dump-header').addEventListener('click', function () {
    const slots = Array.from(document.querySelectorAll('.fmn-hdr-grid > [data-fmn-col]'));
    const out = slots.map(function (s) {
      return s.getAttribute('data-fmn-col') + ': "' + (s.textContent || '').trim() + '"'
        + (s.hasAttribute('hidden') ? ' [hidden]' : '');
    });
    document.getElementById('probe').textContent = out.join('\n');
  });
</script>

<script>
  // Cache-bust the content script. Chrome aggressively caches <script src>
  // URLs per-origin, so a static `<script src="...augment.js">` will stick
  // with the first version loaded into the tab. Injecting the tag with a
  // unique query string on every page load forces a fresh fetch.
  (function () {
    const s = document.createElement('script');
    s.src = '../../extension/src/content/augment.js?cb=' + Date.now();
    document.body.appendChild(s);
  })();
</script>

</body>
</html>
