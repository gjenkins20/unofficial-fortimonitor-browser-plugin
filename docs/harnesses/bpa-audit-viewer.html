<!DOCTYPE html>
<!--
  Unofficial FortiMonitor Toolkit - BPA Audit viewer synthetic harness (FMN-133).
  Built by Gregori Jenkins · https://www.linkedin.com/in/gregorijenkins

  Loads viewer.js with a fixture inventory + analysis so the 11-tab
  surface can be exercised without a live FortiMonitor tenant. No
  chrome.* APIs are required - the viewer is pure DOM.

  How to open:
    Default Chrome blocks ES-module imports across file:// directories,
    so opening this HTML directly will fail silently. Use a local HTTP
    server instead. From the repo root:
      python3 -m http.server 8000
    then visit http://localhost:8000/docs/harnesses/bpa-audit-viewer.html
    The Playwright runner uses --allow-file-access-from-files which
    bypasses this restriction; the harness is exercised in CI via
    tests/e2e/bpa-audit-viewer.spec.js.

  Per memory verify_in_playwright_what_you_can.md: this harness is the
  Claude-side QA for the viewer's tab strip + section rendering + CSV
  builder shape. Operator QA happens against a real tenant + popup install.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BPA Audit Viewer harness · FMN-133</title>
<style>

  h1 { margin: 0 0 0.5rem; }
  .heartbeat { color: #888; font-size: 0.85rem; }
  .frame { border: 1px solid #ccc; border-radius: 6px; padding: 1rem; margin-top: 1rem; }
  .review-table { border-collapse: collapse; width: 100%; font-size: 0.9rem; }
  .review-table th, .review-table td { border: 1px solid #ddd; padding: 0.3rem 0.5rem; text-align: left; vertical-align: top; }
  .review-table th { background: #f3f5f9; }
  .subhead { font-size: 1rem; margin-top: 0.3rem; }
  .muted { color: #777; }
  .btn { padding: 0.35rem 0.8rem; border: 1px solid #1f4e79; border-radius: 4px; background: #fff; cursor: pointer; }

  .annotation-input { font: inherit; }
</style>
</head>
<body>

<p class="muted">FMN-133 - synthetic 11-tab render against a fixture inventory + analysis. The heartbeat ticks every second to confirm the page isn't frozen.</p>

  // live signal that the viewer doesn't have an analogous bug.
  let hb = 0;

    hb += 1;
    document.getElementById('heartbeat').textContent = `[heartbeat: ${hb}]`;

  renderViewer({ root: document.getElementById('harness-host'), store });

  console.log(`[bpa-harness] mounted, ${getTabs().length} tabs, ${inventory.servers.length} servers, ${inventory.outages.length} outages`);
