<!DOCTYPE html>
<!--
  Unofficial FortiMonitor Toolkit - BPA Audit viewer synthetic harness (FMN-133).
  Built by Gregori Jenkins · https://www.linkedin.com/in/gregorijenkins

  Loads viewer.js with a fixture inventory + analysis so the 11-tab
  surface can be exercised without a live FortiMonitor tenant. No
  chrome.* APIs are required - the viewer is pure DOM.

  How to open:
    Default Chrome blocks ES-module imports across file:// directories,
    so opening this HTML directly will fail silently. Use a local HTTP
    server instead. From the repo root:
      python3 -m http.server 8000
    then visit http://localhost:8000/docs/harnesses/bpa-audit-viewer.html
    The Playwright runner uses --allow-file-access-from-files which
    bypasses this restriction; the harness is exercised in CI via
    tests/e2e/bpa-audit-viewer.spec.js.

  Per memory verify_in_playwright_what_you_can.md: this harness is the
  Claude-side QA for the viewer's tab strip + section rendering + CSV
  builder shape. Operator QA happens against a real tenant + popup install.
-->

<body>
<h1>BPA Audit Viewer harness <span class="heartbeat" id="heartbeat">[heartbeat: 0]</span></h1>
<p class="muted">FMN-133 - synthetic 11-tab render against a fixture inventory + analysis. The heartbeat ticks every second to confirm the page isn't frozen.</p>
<div id="harness-host" class="frame"></div>

<script>
  // FMN-136: capture window.print() invocations from the BPA PDF iframe
  // so the Playwright spec can assert against the printable HTML without
  // a real print dialog blocking the test.
  //
  // Technique: wrap the HTMLIFrameElement srcdoc setter and inject a
  // <script> at the top of the printable body that swaps window.print
  // for a recorder before printReport's load handler invokes it.
  window.__pdfPrintCalls = [];
  (function patchSrcdoc() {
    const desc = Object.getOwnPropertyDescriptor(HTMLIFrameElement.prototype, 'srcdoc');
    if (!desc || !desc.set) return;
    Object.defineProperty(HTMLIFrameElement.prototype, 'srcdoc', {
      configurable: true,
      get: desc.get,
      set(v) {
        if (this.dataset && this.dataset.test === 'bpa-pdf-iframe' && typeof v === 'string') {
          const stub = '<script>window.print = function () { try { window.parent.__pdfPrintCalls.push({ html: document.documentElement.outerHTML, ts: Date.now() }); } catch (e) {} };<\/script>';
          v = v.replace('<body>', '<body>' + stub);
        }
        return desc.set.call(this, v);
      }
    });
  })();
</script>
<script type="module">
  import { renderViewer, getTabs } from '../../extension/src/ui/bpa-audit/viewer.js';
  import { runAllAnalyzers } from '../../extension/src/lib/bpa-analyzers/index.js';

  // Heartbeat - if the harness freezes (eg. infinite render loop) the
  // counter stops ticking. Per Verification Discipline rule 5,
  // augment.js-style feedback loops have shipped before; we want a
  // live signal that the viewer doesn't have an analogous bug.
  let hb = 0;
  setInterval(() => {
    hb += 1;
    document.getElementById('heartbeat').textContent = `[heartbeat: ${hb}]`;
  }, 1000);

  // Fixture inventory: small but exercises every analyzer + synthesis path.
  const inventory = {
    // Core inventory with enough variety to flip every status / status_reasoning case

      { id: 1, name: 'fgvm-prod-01', fqdn: 'fgvm-prod-01.acme.com', status: 'active', server_template: '/v2/server_template/9' },
      { id: 2, name: 'fgvm-prod-02', fqdn: 'fgvm-prod-02.acme.com', status: 'active', server_template: '/v2/server_template/9' },
      { id: 3, name: 'fgvm-prod-03', fqdn: 'fgvm-prod-03.acme.com', status: 'paused', server_template: '/v2/server_template/9' }

    ],
    server_templates: [
      { id: 9,  name: 'Linux Standard',  url: '/v2/server_template/9',
        server_group: 'https://api2.panopta.com/v2/server_group/100' },        // FortiMonitor stock
      { id: 10, name: 'Stock Windows',   url: '/v2/server_template/10' },     // custom (cleanup candidate)
      { id: 11, name: 'Tuned Database',  url: '/v2/server_template/11' },     // custom (clean)
      // FMN-147: second custom template overlapping with 10 so the
      // viewer harness exercises the overlap section's ID columns.
      { id: 12, name: 'Custom Win Variant', url: '/v2/server_template/12' }
    ],
    outages: [
      { id: 5001, server_name: 'fgvm-prod-01', active: true, severity: 'critical', acknowledged: false, start_time: '2026-04-30T12:00:00Z' },
      { id: 5002, server_name: 'fgvm-prod-02', active: true, severity: 'warning', acknowledged: true, start_time: '2026-04-30T18:30:00Z' },
      { id: 5003, server_name: 'fgvm-prod-01', active: false, severity: 'warning', start_time: '2026-04-29T10:00:00Z', end_time: '2026-04-29T10:10:00Z' },
      { id: 5004, server_name: 'fgvm-prod-01', active: false, severity: 'warning', start_time: '2026-04-29T11:00:00Z', end_time: '2026-04-29T11:10:00Z' },
      { id: 5005, server_name: 'fgvm-prod-01', active: false, severity: 'warning', start_time: '2026-04-29T12:00:00Z', end_time: '2026-04-29T12:10:00Z' }
    ],
    outage_logs: {
      '5001': [{ description: 'Incident detected ICMP Ping (fgvm-prod-01.acme.com)' }]
    },
    outage_stats_7d:  { total: 6, by_severity: { critical: 2, warning: 4 } },
    outage_stats_30d: { total: 18, by_severity: { critical: 5, warning: 13 } },
    outage_stats_60d: { total: 30 },

    compound_services: [],
    dem_applications: [],
    dashboards: [{ id: 1, name: 'Ops' }],
    status_pages: [],
    contacts: [{ id: 1, display_name: 'Greg', email: 'g@acme', contact_info: [{}, {}] }],
    contact_groups: [],
    notification_schedules: [{ id: 1 }],
    rotating_contacts: [],
    maintenance_windows: [{ id: 1 }],
    onsights: [{ id: 1, name: 'OnSight 1' }],
    fabric_connections: [{ id: 1 }],
    cloud_credentials: [],
    snmp_credentials: [],
    monitoring_nodes: [{ id: 1, name: 'mon-1' }],
    users: [
      { id: 1, name: 'Alice', email: 'a@acme.com', created: '2024-01-01', contact_info: [{}, {}, {}] },
      { id: 2, name: 'Bob',   email: 'b@acme.com', created: '2025-06-01', contact_info: [{}] },
      { id: 3, name: 'Alice', email: 'alice2@acme.com', created: '2024-03-01', contact_info: [] }
    ],
    // FMN-143: simulate a wizard run where "Include FortiMonitor UI data"
    // was on. Alice (id=1) has both fields populated; Bob (id=2) has only
    // created_on; user 3 has no frontend datum at all -> Last Login
    // renders 'N/A' (no manual fallback).
    frontend_user_data: {
      '1': { last_login: '2026-04-30 12:34:56 UTC', created_on: 'Jan 1, 2024' },
      '2': { last_login: null, created_on: 'Jun 1, 2025' }
    },
    server_group_details: {
      '11': { id: 11, name: 'Prod', server_template: { name: 'Linux Standard' }, server_list: [{ id: 1 }, { id: 2 }], parent: '/v2/server_group/100', notification_schedule: '/v2/notification_schedule/1' },

    },
    server_template_details: {

    // metadata only - threshold data lives at /report/get_monitoring_config_data.
    // BpaFrontendFetcher.collectTemplateConfigs populates this map. Each
    // value is the parseMonitoringConfig output: counts + metric names.
    template_monitoring_configs: {
      // 'Linux Standard': metrics defined but zero alerts -> default-only
      '9':  { total_metrics: 5, alerts_count: 0, metric_names: ['CPU', 'Memory', 'Disk', 'Network', 'Uptime'], metrics_without_alerts: ['CPU', 'Memory', 'Disk', 'Network', 'Uptime'] },
      // 'Stock Windows': cleanup-candidate (1 alerted) AND overlaps with 9 (Jaccard 4/5 = 0.8 >= 0.6 threshold) -> exercises FMN-147 overlap-row IDs
      '10': { total_metrics: 4, alerts_count: 1, metric_names: ['CPU', 'Memory', 'Disk', 'Network'], metrics_without_alerts: ['Memory', 'Disk', 'Network'] },
      // 'Tuned Database': fully tuned, disjoint metric set -> no overlap flag
      '11': { total_metrics: 3, alerts_count: 3, metric_names: ['Connections', 'QueryTime', 'Locks'], metrics_without_alerts: [] },
      // 'Custom Win Variant': overlaps Stock Windows (Jaccard 4/5 = 0.8 >= 0.6 threshold) -> exercises FMN-147 overlap-row IDs
      '12': { total_metrics: 5, alerts_count: 2, metric_names: ['CPU', 'Memory', 'Disk', 'Network', 'IIS'], metrics_without_alerts: ['Disk', 'Network', 'IIS'] }
    },

    // Deep-mode fixture data
    server_resources: {
      '1': [
        { id: 11, agent_resource_type: { name: 'CPU' } },
        { id: 12, agent_resource_type: { name: 'Memory' } }
      ],
      '2': [
        { id: 21, agent_resource_type: { name: 'CPU' } },
        { id: 22, agent_resource_type: { name: 'Memory' } }
      ],
      '3': [
        { id: 31, agent_resource_type: { name: 'CPU' } } // missing Memory vs peers

    },
    server_resource_details: {
      '1': { '11': { agent_resource_type: { name: 'CPU' }, agent_resource_threshold: [{ warning: 80, critical: 90 }] }, '12': {} },
      '2': { '21': { agent_resource_type: { name: 'CPU' }, agent_resource_threshold: [{ warning: 80, critical: 90 }] }, '22': {} },
      '3': { '31': { agent_resource_type: { name: 'CPU' }, agent_resource_threshold: [{ warning: 80, critical: 90 }] } }
    }
  };

  // FMN-149: optional ?sections=... query string drives the viewer's
  // tab-filter so a Playwright spec can exercise per-section delivery
  // (e.g. ?sections=user-activity hides cross-cutting tabs and renders
  // only User Activity + Raw Counts). Default is unset = today's full
  // 11-tab render.
  const params = new URLSearchParams(window.location.search);
  const sectionsParam = params.get('sections');
  const sections = sectionsParam ? sectionsParam.split(',').map((s) => s.trim()).filter(Boolean) : null;

  const analysis = runAllAnalyzers(inventory, sections ? { sections } : undefined);

  const store = {
    customerName: 'Acme Corp (harness)',
    deep: true,
    maxServers: 0,
    // FMN-147: simulate the SW having captured a regional tenant origin
    // so the harness exercises the template-link rendering.
    runResult: { inventory, analysis, deep: true, tenant_origin: 'https://my.us02.fortimonitor.com', sections: sections ?? undefined }
  };

  renderViewer({ root: document.getElementById('harness-host'), store });

  console.log(`[bpa-harness] mounted, ${getTabs().length} tabs, ${inventory.servers.length} servers, ${inventory.outages.length} outages, sections=${JSON.stringify(sections)}`);
</script>
</body>
