<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Harness: Intro tour engine + renderer (FMN-167)</title>
<!--
  Synthetic harness for the FMN-167 intro tour framework
  (extension/src/ui/intro-tour/*).

  Verification Discipline #2: this is the synthetic-harness path for the
  FMN-167 verification. Confirms:

    1. The engine validates a step list and exposes IntroTour as a
       class.
    2. renderStep mounts the caption + Next button into the page.
    3. Clicking Next advances; on the last step it completes and
       tears the overlay down.
    4. The Dismiss (x) button tears the overlay down without advancing.
    5. The anchor selector resolves against a fixture node mimicking
       FortiMonitor's nav (li.pa-side-nav__top-level-item).
    6. Caption HTML is rendered (with sanitization).

  How to drive manually (not required - the Playwright spec automates
  the same checks):

    1. From repo root: python3 -m http.server 8765
    2. Open: http://localhost:8765/docs/harnesses/intro-tour-harness.html
    3. Click "Start tour". The caption + Next button render next to the
       highlighted nav item.
    4. Click Next to walk the multi-step demo. Last Next completes.

  The harness uses ES-module imports directly from the sibling
  extension/src/ tree (file:// works under
  --allow-file-access-from-files; the Python http.server path works
  unconditionally).
-->
<link rel="stylesheet" href="../../extension/src/ui/intro-tour/styles.css">
<style>
  body {
    font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 0; padding: 16px; background: #f4f5f7; color: #222;
  }
  h1 { font-size: 16px; margin: 0 0 12px; }
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 16px;
  }
  /* Fixture mimicking FortiMonitor's pa-side-nav. The engine's anchor
     selector finds these nodes. */
  nav.pa-side-nav {
    background: #16273f;
    color: #cbd6e4;
    border-radius: 6px;
    padding: 8px 0;
    min-height: 360px;
  }
  ul.pa-side-nav__list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  li.pa-side-nav__top-level-item {
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 12.5px;
  }
  li.pa-side-nav__top-level-item:hover {
    background: rgba(255, 255, 255, 0.05);
  }
  main {
    background: #fff;
    border: 1px solid #d4d7dc;
    border-radius: 6px;
    padding: 16px;
    min-height: 360px;
  }
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  button.harness-btn {
    font: inherit;
    padding: 6px 12px;
    background: #fff;
    border: 1px solid #c4c8cf;
    border-radius: 4px;
    cursor: pointer;
  }
  button.harness-btn:hover { background: #f0f2f5; }
  .log {
    margin-top: 16px;
    background: #0d1421;
    color: #b9d6f5;
    padding: 8px 12px;
    border-radius: 4px;
    font: 11.5px ui-monospace, Menlo, monospace;
    min-height: 80px;
    max-height: 200px;
    overflow: auto;
  }
  .log .entry { padding: 2px 0; border-bottom: 1px solid #1c2a44; }
</style>
</head>
<body>
<h1>FMN-167 intro tour harness</h1>
<div class="controls">
  <button id="btn-start" class="harness-btn" data-test="start-tour">Start tour</button>
  <button id="btn-start-multi" class="harness-btn" data-test="start-multi">Start multi-step tour</button>
  <button id="btn-start-bottom-anchor" class="harness-btn" data-test="start-bottom-anchor">Start near-bottom anchor</button>
  <button id="btn-validate-good" class="harness-btn" data-test="validate-good">Validate sample step (good)</button>
  <button id="btn-validate-bad" class="harness-btn" data-test="validate-bad">Validate sample step (bad)</button>
</div>
<!-- FMN-240: anchor pinned to the viewport bottom-left, ~30px tall, used
     to verify positionCard clamps the card inside the viewport instead
     of letting it dangle off the bottom. -->
<div id="bottom-anchor" data-test="bottom-anchor" style="position: fixed; left: 30px; bottom: 30px; width: 80px; height: 30px; background: #d9541e; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; border-radius: 4px;">+ Add</div>
<div class="layout">
  <nav class="pa-side-nav" id="fake-nav">
    <ul class="pa-side-nav__list">
      <li class="pa-side-nav__top-level-item" data-route="/dashboards">
        <span>Dashboards</span>
      </li>
      <li class="pa-side-nav__top-level-item" data-route="/report/ListServers">
        <span>Instances</span>
      </li>
      <li class="pa-side-nav__top-level-item" data-route="/report/AlertTimelines">
        <span>Alert Timelines</span>
      </li>
      <li class="pa-side-nav__top-level-item" data-route="/report/CannedReports">
        <span>Reports</span>
      </li>
    </ul>
  </nav>
  <main id="fake-main">
    <h2 data-test="page-title">Dashboards</h2>
    <p>This fixture mimics a FortiMonitor page so the tour engine has a real DOM
    to anchor against. Click <strong>Start tour</strong> to mount the engine.</p>
  </main>
</div>
<div class="log" id="log" data-test="event-log"></div>
<script type="module">
import {
  IntroTour,
  runTour,
  validateStep
} from '../../extension/src/ui/intro-tour/tour-engine.js';

const log = document.getElementById('log');
function note(msg) {
  const div = document.createElement('div');
  div.className = 'entry';
  div.textContent = `[${new Date().toISOString().slice(11, 19)}] ${msg}`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

const SINGLE_STEP = [
  {
    id: 'dashboards-welcome',
    anchor: 'li.pa-side-nav__top-level-item',
    caption_html: '<p><strong>Welcome.</strong> Click Next to finish.</p>',
    advance: 'next-button',
    placement: 'right'
  }
];

const MULTI_STEPS = [
  {
    id: 'step-1-dashboards',
    anchor: 'li.pa-side-nav__top-level-item[data-route="/dashboards"]',
    caption_html: '<p>Step 1: <strong>Dashboards</strong>. Operator-built overviews.</p>',
    advance: 'next-button',
    placement: 'right'
  },
  {
    id: 'step-2-instances',
    anchor: 'li.pa-side-nav__top-level-item[data-route="/report/ListServers"]',
    caption_html: '<p>Step 2: <strong>Instances</strong>. Every monitored thing.</p>',
    advance: 'next-button',
    placement: 'right'
  },
  {
    id: 'step-3-alerts',
    anchor: 'li.pa-side-nav__top-level-item[data-route="/report/AlertTimelines"]',
    caption_html: '<p>Step 3: <strong>Alert Timelines</strong>. Your incident history.</p>',
    advance: 'next-button',
    placement: 'right'
  }
];

document.getElementById('btn-start').addEventListener('click', async () => {
  note('starting single-step tour');
  const tour = await runTour(SINGLE_STEP, {
    onComplete: () => note('onComplete fired'),
    onDismiss: () => note('onDismiss fired'),
    onAdvance: (from, to) => note(`onAdvance ${from?.id} -> ${to?.id}`)
  });
  // Expose for the Playwright spec.
  window.__harnessTour = tour;
});

document.getElementById('btn-start-multi').addEventListener('click', async () => {
  note('starting multi-step tour');
  const tour = await runTour(MULTI_STEPS, {
    onComplete: () => note('onComplete fired'),
    onDismiss: () => note('onDismiss fired'),
    onAdvance: (from, to) => note(`onAdvance ${from?.id} -> ${to?.id}`)
  });
  window.__harnessTour = tour;
});

// FMN-240: drive a tour against the bottom-anchor fixture. The card's
// 'right' placement at the anchor's top would push the card below the
// viewport without the clamp; this button exists so the Playwright spec
// can verify positionCard clamps the card back inside.
const BOTTOM_ANCHOR_STEP = [
  {
    id: 'bottom-anchor-step',
    anchor: '#bottom-anchor',
    caption_html: '<p>Anchor sits near the viewport bottom; the card must stay in-bounds.</p>',
    advance: 'next-button',
    placement: 'right'
  }
];

document.getElementById('btn-start-bottom-anchor').addEventListener('click', async () => {
  note('starting bottom-anchor tour');
  const tour = await runTour(BOTTOM_ANCHOR_STEP, {
    onComplete: () => note('onComplete fired'),
    onDismiss: () => note('onDismiss fired')
  });
  window.__harnessTour = tour;
});

document.getElementById('btn-validate-good').addEventListener('click', () => {
  const res = validateStep(SINGLE_STEP[0]);
  note(`validate good: ok=${res.ok}`);
});

document.getElementById('btn-validate-bad').addEventListener('click', () => {
  const res = validateStep({ id: '', advance: 'never' });
  note(`validate bad: ok=${res.ok}, errors=${res.errors.length}`);
});

// Surface the validateStep export for the Playwright spec.
window.__harnessSchema = { validateStep };
window.__harnessReady = true;
note('harness ready');
</script>
</body>
</html>
