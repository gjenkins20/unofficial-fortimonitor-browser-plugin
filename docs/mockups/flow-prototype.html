<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flow Prototype - FortiMonitor WAN Cleanup (FMN-38)</title>
<style>
  :root {
    --bg: #eef1f5;
    --card: #ffffff;
    --border: #d5dae1;
    --border-strong: #b4bcc6;
    --text: #1a2230;
    --text-muted: #6b7380;
    --accent: #d9541e;
    --accent-soft: #fde9dd;
    --ok: #1e7a3c;
    --ok-soft: #dcf4e1;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  .nav {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    box-shadow: 0 1px 2px rgba(0,0,0,0.02);
  }
  .nav-title {
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  .nav-title .icon {
    width: 18px; height: 18px; background: var(--accent); border-radius: 3px;
    display: inline-grid; place-items: center; color: white; font-size: 11px; font-weight: bold;
  }
  .nav-title .subtitle { color: var(--text-muted); font-weight: 400; margin-left: 4px; }

  .steps {
    flex: 1;
    display: flex;
    gap: 4px;
    overflow-x: auto;
  }
  .step-btn {
    padding: 6px 14px;
    background: #f5f6f8;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 12px;
    cursor: pointer;
    color: var(--text);
    white-space: nowrap;
    font-family: inherit;
    display: flex; align-items: center; gap: 6px;
  }
  .step-btn:hover { background: white; border-color: var(--accent); }
  .step-btn.active {
    background: var(--accent); color: white; border-color: var(--accent); font-weight: 500;
  }
  .step-btn .step-num {
    font-size: 10px; opacity: 0.7;
  }
  .step-btn.active .step-num { opacity: 0.9; }

  .controls {
    display: flex; gap: 6px; align-items: center;
  }
  .ctrl-btn {
    padding: 6px 12px;
    background: white;
    border: 1px solid var(--border-strong);
    border-radius: 5px;
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    color: var(--text);
    font-family: inherit;
  }
  .ctrl-btn:hover { background: #f5f6f8; }
  .ctrl-btn[disabled] { opacity: 0.4; cursor: not-allowed; }
  .ctrl-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .ctrl-btn.primary:hover { background: #b8461a; }

  .progress-rail {
    height: 3px;
    background: var(--border);
    position: relative;
  }
  .progress-fill {
    position: absolute; top: 0; left: 0;
    height: 100%;
    background: var(--accent);
    transition: width 0.2s ease;
  }

  .viewport {
    flex: 1;
    overflow: hidden;
    background: #f5f6f8;
    position: relative;
  }
  iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  .hint {
    position: absolute;
    bottom: 14px; right: 14px;
    background: var(--text);
    color: white;
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 5px;
    opacity: 0.75;
    pointer-events: none;
  }
  .hint code {
    background: rgba(255,255,255,0.15);
    padding: 1px 5px; border-radius: 3px;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 10.5px;
  }

  @media (max-width: 720px) {
    .nav { flex-direction: column; align-items: stretch; }
    .steps { order: 2; }
    .controls { order: 3; justify-content: space-between; }
    .nav-title { order: 1; }
  }
</style>
</head>
<body>

<div class="nav">
  <div class="nav-title">
    <span class="icon">F</span>
    WAN Cleanup Flow Prototype
    <span class="subtitle">- click through the operator experience</span>
  </div>

  <div class="steps" id="steps"></div>

  <div class="controls">
    <button class="ctrl-btn" id="prev">← Prev</button>
    <button class="ctrl-btn primary" id="next">Next →</button>
  </div>
</div>

<div class="progress-rail">
  <div class="progress-fill" id="progress"></div>
</div>

<div class="viewport">
  <iframe id="frame" src="batch-start.html" title="Current step mockup"></iframe>
  <div class="hint">Keyboard: <code>←</code> / <code>→</code> to navigate steps</div>
</div>

<script>
  const steps = [
    { id: 1, label: "Load devices",     file: "batch-start.html" },
    { id: 2, label: "Review groups",    file: "interface-report.html" },
    { id: 3, label: "Audit queue",      file: "queue-overview.html" },
    { id: 4, label: "Execute",          file: "execution-progress.html" },
    { id: 5, label: "Results",          file: "results.html" }
  ];

  const stepsEl = document.getElementById("steps");
  const frame = document.getElementById("frame");
  const prev = document.getElementById("prev");
  const next = document.getElementById("next");
  const progress = document.getElementById("progress");

  let current = 0;

  function render() {
    stepsEl.innerHTML = "";
    steps.forEach((s, i) => {
      const btn = document.createElement("button");
      btn.className = "step-btn" + (i === current ? " active" : "");
      btn.innerHTML = '<span class="step-num">' + s.id + '</span>' + s.label;
      btn.addEventListener("click", () => go(i));
      stepsEl.appendChild(btn);
    });
    frame.src = steps[current].file;
    prev.disabled = current === 0;
    next.disabled = current === steps.length - 1;
    progress.style.width = ((current + 1) / steps.length * 100) + "%";
    const hashStep = steps[current].id;
    if (location.hash !== "#" + hashStep) {
      history.replaceState(null, "", "#" + hashStep);
    }
  }

  function go(i) {
    if (i < 0 || i >= steps.length) return;
    current = i;
    render();
  }

  prev.addEventListener("click", () => go(current - 1));
  next.addEventListener("click", () => go(current + 1));

  document.addEventListener("keydown", (e) => {
    if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")) return;
    if (e.key === "ArrowLeft") go(current - 1);
    if (e.key === "ArrowRight") go(current + 1);
  });

  const startHash = parseInt(location.hash.replace("#", ""), 10);
  if (!isNaN(startHash) && startHash >= 1 && startHash <= steps.length) {
    current = startHash - 1;
  }

  render();
</script>

</body>
</html>
