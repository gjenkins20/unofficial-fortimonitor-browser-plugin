<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phase 4 UI — Static Preview</title>
<link rel="stylesheet" href="../../extension/src/ui/styles.css">
<style>
  /* Preview-only chrome: step switcher */
  .preview-switcher {
    max-width: 820px; margin: 0 auto 16px;
    display: flex; gap: 8px; flex-wrap: wrap;
    font-family: -apple-system, sans-serif; font-size: 12px;
  }
  .preview-switcher a {
    padding: 5px 12px; border: 1px solid #c5cbd3;
    border-radius: 5px; background: white; color: #222a35;
    text-decoration: none;
  }
  .preview-switcher a.active { background: #d9541e; color: white; border-color: #d9541e; }
  .preview-switcher .note { margin-left: auto; color: #6b7380; font-size: 11px; align-self: center; }
</style>
</head>
<body>

<div class="preview-switcher">
  <a href="?step=start">start</a>
  <a href="?step=review">review</a>
  <a href="?step=queue">queue</a>
  <a href="?step=execute-dryrun">execute (dry-run)</a>
  <a href="?step=execute-live">execute (mid-run)</a>
  <a href="?step=results-partial">results (partial)</a>
  <a href="?step=results-success">results (all ok)</a>
  <span class="note">Chrome APIs stubbed — no service-worker round-trips.</span>
</div>

<div id="app-root"></div>

<script type="module">
  // Highlight active preview pill.
  const params = new URLSearchParams(location.search);
  const active = params.get('step') || 'start';
  document.querySelectorAll('.preview-switcher a').forEach((a) => {
    if (a.getAttribute('href') === `?step=${active}`) a.classList.add('active');
  });

  // ---------- synthetic data ----------
  const samplePorts = [
    { name: 'DATA',  index: '0', admin_status: 'up',   oper_status: 'up',   descr: null },
    { name: 'GUEST', index: '1', admin_status: 'up',   oper_status: 'up',   descr: null },
    { name: 'MGMT',  index: '2', admin_status: 'up',   oper_status: 'up',   descr: null },
    { name: 'VoIP',  index: '3', admin_status: 'up',   oper_status: 'up',   descr: null },
    { name: 'a',     index: '4', admin_status: 'up',   oper_status: 'up',   descr: null },
    { name: 'b',     index: '5', admin_status: 'up',   oper_status: 'down', descr: null },
    { name: 'fortilink', index: '6', admin_status: 'up', oper_status: 'down', descr: null },
    { name: 'modem', index: '7', admin_status: 'down', oper_status: 'down', descr: null },
    { name: 'port1', index: '8', admin_status: 'up',   oper_status: 'down', descr: null },
    { name: 'port2', index: '9', admin_status: 'up',   oper_status: 'down', descr: null },
    { name: 'port3', index: '10', admin_status: 'up',  oper_status: 'down', descr: null },
    { name: 'port4', index: '11', admin_status: 'up',  oper_status: 'down', descr: null },
    { name: 'port5', index: '12', admin_status: 'up',  oper_status: 'down', descr: null },
    { name: 'port6', index: '13', admin_status: 'up',  oper_status: 'down', descr: null },
    { name: '(Comcast Business)', index: '14', admin_status: 'up', oper_status: 'up', descr: null },
    { name: 'wan2',  index: '15', admin_status: 'up', oper_status: 'down', descr: null }
  ];

  const altPorts = [
    { name: 'DATA',  index: '0', admin_status: 'up',   oper_status: 'up' },
    { name: 'GUEST', index: '1', admin_status: 'up',   oper_status: 'up' },
    { name: 'MGMT',  index: '2', admin_status: 'up',   oper_status: 'up' },
    { name: 'x1',    index: '3', admin_status: 'up',   oper_status: 'up' },
    { name: 'x2',    index: '4', admin_status: 'up',   oper_status: 'down' },
    { name: 'fortilink', index: '5', admin_status: 'up', oper_status: 'down' }
  ];

  const smallPorts = [
    { name: 'wan1',  index: '0', admin_status: 'up', oper_status: 'up' },
    { name: 'lan1',  index: '1', admin_status: 'up', oper_status: 'up' }
  ];

  const fpA = 'fp_aaaaaaaaaaaa3b2ea881';
  const fpB = 'fp_bbbbbbbbbbbbb104e527';
  const fpC = 'fp_ccccccccccccc5a679b23';

  function mkGroup(fp, ports, deviceCount, prefix) {
    const devices = [];
    for (let i = 1; i <= deviceCount; i++) {
      devices.push({ serverId: 42020000 + (fp.charCodeAt(3) * 1000) + i });
    }
    return {
      fingerprint: fp,
      portsData: { filterType: 'all', portFilters: { searchTerm: '', filters: [] }, ports },
      devices
    };
  }

  const groups = [
    mkGroup(fpA, samplePorts, 23, 'FGT-Branch'),
    mkGroup(fpB, altPorts,    12, 'FGT-Remote'),
    mkGroup(fpC, smallPorts,   3, 'FGT-Edge')
  ];

  const nameById = {};
  groups.forEach((g, gi) => {
    const prefix = ['FGT-Branch', 'FGT-Remote', 'FGT-Edge'][gi];
    g.devices.forEach((d, di) => {
      nameById[String(d.serverId)] = `${prefix}-${String(di + 1).padStart(3, '0')}`;
    });
  });

  // ---------- chrome API stubs ----------
  const eventListeners = new Set();
  const mockHandlers = {
    'scan-devices': async ({ serverIds }) => {
      // Return our canned 3-group scan result regardless of input.
      return { groups, errored: [] };
    },
    'queue:replace': async () => ({ count: 0 }),
    'queue:clear':   async () => ({ ok: true }),
    'queue:list':    async () => [],
    'execute-queue': async () => ({ results: [], startedAt: new Date().toISOString() }),
    'abort-run':     async () => ({ aborted: true }),
    'run-status':    async () => ({ running: false, startedAt: null })
  };

  window.chrome = {
    runtime: {
      lastError: null,
      sendMessage: (msg, cb) => {
        const handler = mockHandlers[msg?.type];
        Promise.resolve()
          .then(() => handler ? handler(msg.payload ?? {}) : Promise.reject(new Error('unknown: ' + msg?.type)))
          .then(
            (result) => cb({ ok: true, result }),
            (error) => cb({ ok: false, error: error.message })
          );
      },
      onMessage: {
        addListener: (fn) => eventListeners.add(fn),
        removeListener: (fn) => eventListeners.delete(fn)
      },
      getURL: (p) => p
    },
    action: { onClicked: { addListener: () => {} } },
    tabs: {
      create: () => {},
      getCurrent: (cb) => cb({ id: 1 }),
      remove: () => {}
    },
    cookies: { get: async () => null },
    storage: { local: { get: async () => ({}), set: async () => {} } }
  };

  // ---------- preview store builders ----------
  function baseStore() {
    return {
      batchId: 'b_20260416_preview',
      serverIds: [],
      nameById,
      inputWarnings: [],
      scanResult: null,
      reviewIndex: 0,
      decisions: new Map(),
      queueEntries: [],
      executeConfig: { dryRun: true, verbose: false },
      executePlan: null,
      executeProgress: new Map(),
      runResult: null
    };
  }

  function withScan(store) {
    store.scanResult = { groups, errored: [] };
    store.serverIds = groups.flatMap((g) => g.devices.map((d) => String(d.serverId)));
    return store;
  }

  function withDecisions(store) {
    store.decisions.set(fpA, { skipped: false, removePortNames: ['wan2'] });
    store.decisions.set(fpB, { skipped: false, removePortNames: ['x2'] });
    store.decisions.set(fpC, { skipped: true,  removePortNames: [] });
    return store;
  }

  async function withQueueEntries(store) {
    const { buildQueueEntries } = await import('../../extension/src/ui/plan.js?v=' + Date.now());
    store.queueEntries = buildQueueEntries({
      groups, decisions: store.decisions, nameById: store.nameById, batchId: store.batchId
    });
    return store;
  }

  async function withExecutePlan(store, { dryRun = true } = {}) {
    store.executePlan = {
      entries: store.queueEntries,
      totalDevices: store.queueEntries.length,
      totalPortsToRemove: store.queueEntries.reduce((n, e) => n + (e.removedPortNames?.length ?? 0), 0),
      dryRun,
      verbose: false,
      startedAt: new Date().toISOString()
    };
    return store;
  }

  function withRunResult(store, { mix = 'partial' } = {}) {
    const entries = store.queueEntries;
    const results = entries.map((e, i) => {
      if (mix === 'success') {
        return { entry: e, status: 'succeeded', reason: null, attempts: 1, durationMs: 800 + i * 50 };
      }
      // partial: fail every 10th
      if (i % 10 === 3) {
        const errors = [
          'save_port_selection failed: HTTP 403',
          'save_port_selection failed: network timeout',
          'save_port_selection failed: HTTP 500'
        ];
        return {
          entry: e, status: 'failed',
          reason: { message: errors[i % errors.length] },
          attempts: 3, durationMs: 3000
        };
      }
      return { entry: e, status: 'succeeded', reason: null, attempts: 1, durationMs: 800 + i * 30 };
    });
    store.runResult = {
      results,
      startedAt: new Date(Date.now() - 156000).toISOString(),
      finishedAt: new Date().toISOString(),
      dryRun: false,
      totalDevices: entries.length,
      totalPortsToRemove: entries.reduce((n, e) => n + (e.removedPortNames?.length ?? 0), 0)
    };
    return store;
  }

  // ---------- wiring ----------
  const navigate = (to) => {
    const map = {
      '/start': 'start', '/review': 'review', '/queue': 'queue',
      '/execute': 'execute-dryrun', '/results': 'results-partial'
    };
    location.search = `?step=${map[to] || to.replace(/^\//, '')}`;
  };

  const events = {
    on: (cb) => { eventListeners.add(cb); return () => eventListeners.delete(cb); },
    emit: (event, payload) => { for (const cb of eventListeners) cb(event, payload); }
  };

  async function mount() {
    const container = document.getElementById('app-root');
    let store = baseStore();
    let modPath;
    switch (active) {
      case 'start':
        modPath = 'start.js';
        // Pre-populate paste with test-VM IDs for the default view.
        // (start.js reads store.serverIds + store.nameById to rebuild paste value.)
        store.serverIds = ['42024060', '42024061', '42024075'];
        store.nameById = {
          42024060: 'FGVM01TM24006844',
          42024061: 'FGVM01TM24006845',
          42024075: 'FGVM01TM24006846'
        };
        break;
      case 'review':
        withScan(store);
        modPath = 'review.js';
        break;
      case 'queue':
        withScan(store);
        withDecisions(store);
        await withQueueEntries(store);
        modPath = 'queue.js';
        break;
      case 'execute-dryrun':
        withScan(store);
        withDecisions(store);
        await withQueueEntries(store);
        await withExecutePlan(store, { dryRun: true });
        modPath = 'execute.js';
        break;
      case 'execute-live':
        withScan(store);
        withDecisions(store);
        await withQueueEntries(store);
        await withExecutePlan(store, { dryRun: false });
        // Pre-populate progress with a mid-execution snapshot so the
        // screen renders with running/ok/fail/pending mix without
        // depending on the service-worker round-trip.
        {
          const entries = store.queueEntries;
          const prog = store.executeProgress;
          entries.forEach((e, i) => {
            if (i < Math.floor(entries.length * 0.6)) {
              prog.set(e.id, { status: 'ok', durationMs: 900 + i * 10, attempts: 1 });
            } else if (i < Math.floor(entries.length * 0.6) + 3) {
              prog.set(e.id, { status: 'running', startedAt: Date.now() - 500 });
            } else if (i < Math.floor(entries.length * 0.6) + 6) {
              prog.set(e.id, { status: 'fail', error: 'save_port_selection failed: HTTP 403', attempts: 3 });
            } else {
              prog.set(e.id, { status: 'pending' });
            }
          });
        }
        modPath = 'execute.js';
        break;
      case 'results-partial':
        withScan(store);
        withDecisions(store);
        await withQueueEntries(store);
        withRunResult(store, { mix: 'partial' });
        modPath = 'results.js';
        break;
      case 'results-success':
        withScan(store);
        withDecisions(store);
        await withQueueEntries(store);
        withRunResult(store, { mix: 'success' });
        modPath = 'results.js';
        break;
      default:
        modPath = 'start.js';
    }

    const mod = await import(`../../extension/src/ui/steps/${modPath}?v=${Date.now()}`);
    mod.render({ container, store, navigate, events });
  }

  mount().catch((err) => {
    document.getElementById('app-root').textContent = 'Preview mount failed: ' + err.message;
    console.error(err);
  });
</script>
</body>
</html>
